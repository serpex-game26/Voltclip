<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>VoltClip ⚡</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@300;400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07070f;--s1:#0f0f1a;--s2:#16162a;--s3:#1e1e35;
  --border:#ffffff12;--border2:#ffffff20;
  --volt:#d4ff00;--pink:#ff3080;--cyan:#00d4ff;--orange:#ff8c00;--green:#00e676;
  --text:#f2f2ff;--muted:#6060a0;--muted2:#9090c0;
  --nav-h:60px;--top-h:52px;
  --font-h:'Syne',sans-serif;--font-b:'Manrope',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);overflow:hidden;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:2px;height:2px;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.h{display:none!important;}
button,input{font-family:var(--font-b);}

/* ── GRAIN ── */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;opacity:.2;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");}

/* ══ AGE GATE ══ */
#age-gate{position:fixed;inset:0;z-index:9500;background:radial-gradient(ellipse at 50% 0%,#1c1c40,var(--bg) 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px;text-align:center;}
.ag-logo{font-family:var(--font-h);font-size:clamp(34px,10vw,70px);font-weight:800;color:var(--volt);letter-spacing:2px;max-width:90vw;word-break:break-word;text-align:center;animation:glow 3s ease-in-out infinite;}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 28px rgba(212,255,0,.4));}50%{filter:drop-shadow(0 0 60px rgba(212,255,0,.9));}}
.ag-sub{color:var(--muted);font-size:13px;max-width:300px;line-height:1.7;}
.ag-q{font-family:var(--font-h);font-size:clamp(17px,5vw,23px);font-weight:700;}
.ag-btns{display:flex;gap:12px;}
.ag-btns button{padding:13px 30px;border-radius:100px;border:none;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;}
.ag-yes{background:var(--volt);color:#000;}.ag-yes:hover{transform:scale(1.06);box-shadow:0 0 28px rgba(212,255,0,.5);}
.ag-no{background:var(--s2);color:var(--muted);border:1px solid var(--border);}

/* ══ MODAL BASE ══ */
.modal-bg{position:fixed;inset:0;z-index:7500;background:rgba(0,0,0,.8);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:var(--s1);border:1px solid var(--border);border-radius:22px;padding:26px;width:100%;max-width:390px;display:flex;flex-direction:column;gap:13px;animation:su .28s ease;}
@keyframes su{from{transform:translateY(18px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-logo{font-family:var(--font-h);font-size:26px;font-weight:800;color:var(--volt);text-align:center;letter-spacing:4px;}
.tabs{display:flex;background:var(--s2);border-radius:100px;padding:3px;gap:3px;}
.tabs button{flex:1;padding:9px;border-radius:100px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.tabs button.on{background:var(--volt);color:#000;}
.inp{background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:12px 14px;color:var(--text);font-size:13px;width:100%;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--volt);}
.inp::placeholder{color:var(--muted);}
.btn-v{background:var(--volt);color:#000;border:none;border-radius:100px;padding:12px;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;width:100%;}
.btn-v:hover{transform:scale(1.02);box-shadow:0 0 22px rgba(212,255,0,.4);}
.btn-v:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-ghost{padding:11px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-weight:700;cursor:pointer;transition:border-color .2s;font-size:13px;}
.err-msg{font-size:11px;color:var(--pink);text-align:center;min-height:14px;}
.hint{font-size:11px;color:var(--muted);text-align:center;}
.hint span{color:var(--volt);cursor:pointer;}

/* ══ LAYOUT ══ */
#app{height:100vh;display:flex;flex-direction:column;}

/* ══ TOP BAR ══ */
#topbar{
  height:var(--top-h);flex-shrink:0;
  background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;z-index:100;position:relative;
}
.top-logo{font-family:var(--font-h);font-size:22px;font-weight:800;color:var(--volt);letter-spacing:3px;}
.top-right{display:flex;align-items:center;gap:10px;}
#top-notif-btn{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;}
#top-av-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--volt);background:var(--s2);color:var(--volt);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#top-av-btn img{width:100%;height:100%;object-fit:cover;}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--pink);border:2px solid var(--s1);display:none;}
.notif-dot.show{display:block;}
#lang-btn{background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:9px;font-weight:800;padding:4px 8px;border-radius:6px;cursor:pointer;}

/* ══ MAIN ══ */
#main{flex:1;overflow:hidden;position:relative;}

/* ══ STORIES BAR ══ */
#stories-bar{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px 8px;overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid var(--border);flex-shrink:0;
  background:var(--bg);
}
#stories-bar::-webkit-scrollbar{display:none;}
.st-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex-shrink:0;}
.st-ring{width:48px;height:48px;border-radius:50%;padding:2px;background:conic-gradient(var(--volt),var(--pink),var(--cyan),var(--volt));animation:spin 4s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.st-ring.seen{background:var(--border);animation:none;}
.st-ring.priv{background:conic-gradient(var(--muted),#333,var(--muted));animation:none;}
.st-inner{width:100%;height:100%;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden;}
.st-name{font-size:9px;color:var(--muted);max-width:48px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.add-st{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex-shrink:0;}
.add-st-c{width:48px;height:48px;border-radius:50%;border:2px dashed var(--volt);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--volt);transition:all .2s;}
.add-st-c:hover{background:rgba(212,255,0,.1);}
.add-st span{font-size:9px;color:var(--muted);}

/* ══ FEED ══ */
#feed-view{display:flex;flex-direction:column;height:100%;overflow:hidden;}
#feed-panel{flex:1;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;}
#feed-panel::-webkit-scrollbar{display:none;}
.vc{
  height:calc(100vh - var(--top-h) - var(--nav-h) - 74px);
  scroll-snap-align:start;position:relative;
  display:flex;align-items:center;justify-content:center;
  background:#000;overflow:hidden;
}
.vc video{height:100%;max-width:100%;object-fit:contain;}
.vc-grad{position:absolute;inset:0;pointer-events:none;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 45%),linear-gradient(to bottom,rgba(0,0,0,.2) 0%,transparent 15%);}
.vc-info{position:absolute;bottom:18px;left:12px;right:62px;pointer-events:none;}
.vc-user-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.vc-av{width:30px;height:30px;border-radius:50%;background:var(--s2);border:2px solid var(--volt);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;cursor:pointer;}
.vc-uname{font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--volt);cursor:pointer;}
.follow-btn-inline{padding:3px 9px;border-radius:100px;border:1px solid var(--volt);background:transparent;color:var(--volt);font-size:9px;font-weight:700;cursor:pointer;transition:all .2s;}
.follow-btn-inline.on{background:var(--volt);color:#000;}
.vc-title{font-size:12px;line-height:1.4;color:rgba(255,255,255,.9);}
.vc-actions{position:absolute;right:8px;bottom:22px;display:flex;flex-direction:column;gap:14px;align-items:center;}
.va{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.va-ic{width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:17px;border:none;cursor:pointer;color:white;transition:all .2s;}
.va-ic:hover,.va-ic:active{transform:scale(1.15);}
.va-ic.liked{background:rgba(255,48,128,.35);}
.va span{font-size:9px;color:rgba(255,255,255,.6);}
.empty-feed{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);}
.empty-feed .icon{font-size:48px;}
.empty-feed p{font-size:13px;}

/* ══ TIKTOK BOTTOM NAV ══ */
#bottom-nav{
  height:var(--nav-h);flex-shrink:0;
  background:var(--s1);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  padding:0 6px;z-index:200;
}
.bn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;flex:1;padding:6px 0;background:none;border:none;color:var(--muted);
  transition:color .2s;position:relative;
}
.bn.on{color:var(--volt);}
.bn .bn-icon{font-size:22px;line-height:1;}
.bn .bn-label{font-size:9px;font-weight:700;letter-spacing:.3px;}
.bn-post{
  flex:0 0 56px;height:36px;
  background:linear-gradient(135deg,var(--volt),var(--cyan));
  border-radius:10px;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;color:#000;
  box-shadow:0 0 16px rgba(212,255,0,.3);
  transition:transform .2s,box-shadow .2s;
}
.bn-post:hover,.bn-post:active{transform:scale(1.08);box-shadow:0 0 24px rgba(212,255,0,.5);}
.bn-dot{position:absolute;top:4px;right:calc(50% - 14px);width:7px;height:7px;border-radius:50%;background:var(--pink);border:2px solid var(--s1);display:none;}
.bn-dot.show{display:block;}

/* ══ CAMERA ══ */
#cam-modal{position:fixed;inset:0;z-index:8000;background:#000;display:flex;flex-direction:column;}
#cam-canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
#cam-preview{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
.cam-top{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);z-index:10;}
.cam-logo{font-family:var(--font-h);font-size:16px;font-weight:800;color:var(--volt);letter-spacing:3px;}
.cam-close{background:rgba(255,255,255,.1);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* Duration */
.dur-row{position:absolute;top:66px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;}
.dur-btn{padding:5px 12px;border-radius:9px;border:2px solid var(--border);background:rgba(0,0,0,.5);color:white;font-size:10px;font-weight:800;cursor:pointer;font-family:var(--font-h);transition:all .2s;}
.dur-btn.on{border-color:var(--volt);color:var(--volt);}
/* Timer */
.rec-timer{position:absolute;top:66px;left:16px;background:rgba(255,48,128,.25);border:1px solid var(--pink);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:700;color:var(--pink);z-index:10;}
.rec-prog{position:absolute;top:60px;left:12px;right:12px;height:3px;background:rgba(255,255,255,.15);border-radius:100px;overflow:hidden;z-index:10;}
.rec-prog-fill{height:100%;background:var(--pink);width:0%;border-radius:100px;}
/* Filters scroll */
.cam-filters{position:absolute;bottom:135px;left:0;right:0;display:flex;gap:8px;padding:0 12px;overflow-x:auto;scrollbar-width:none;z-index:10;}
.cam-filters::-webkit-scrollbar{display:none;}
.filt-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex-shrink:0;}
.filt-circle{width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.5);border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:20px;transition:border-color .2s;overflow:hidden;}
.filt-circle.on{border-color:var(--volt);}
.filt-circle img,.filt-circle video{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.filt-label{font-size:8px;color:rgba(255,255,255,.6);text-align:center;max-width:48px;}
/* Bottom controls */
.cam-bottom{position:absolute;bottom:0;left:0;right:0;padding:14px 24px 32px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to top,rgba(0,0,0,.75),transparent);z-index:10;}
.cam-side{display:flex;flex-direction:column;gap:14px;align-items:center;}
.cam-side-btn{width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#rec-btn{width:72px;height:72px;border-radius:50%;border:4px solid white;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.rec-inner{width:52px;height:52px;border-radius:50%;background:var(--pink);transition:all .3s;}
#rec-btn.recording .rec-inner{border-radius:8px;width:28px;height:28px;}

/* ══ PREVIEW ══ */
#preview-modal{position:fixed;inset:0;z-index:8500;background:#000;display:flex;flex-direction:column;}
#preview-video{flex:1;object-fit:contain;width:100%;max-height:calc(100vh - 230px);}
.prev-panel{padding:14px 14px 6px;display:flex;flex-direction:column;gap:10px;background:var(--s1);}
.prev-title{font-family:var(--font-h);font-size:16px;font-weight:800;color:var(--volt);letter-spacing:2px;}
.vis-row{display:flex;gap:7px;}
.vis-btn{flex:1;padding:8px;border-radius:10px;border:2px solid var(--border);background:transparent;color:var(--muted);font-weight:700;font-size:11px;cursor:pointer;transition:all .2s;}
.vis-btn.on{border-color:var(--volt);color:var(--volt);background:rgba(212,255,0,.07);}
.prev-progress{height:3px;background:var(--s2);overflow:hidden;border-radius:3px;}
.prev-prog-fill{height:100%;background:linear-gradient(90deg,var(--volt),var(--cyan));width:0%;transition:width .3s;}
.prev-status{font-size:11px;color:var(--muted);text-align:center;}
.prev-btns{display:flex;gap:8px;padding-bottom:12px;}
.prev-btns .btn-ghost{flex:1;padding:11px;}
.prev-btns .btn-v{flex:2;}

/* ══ PANELS (MSG / NOTIF / PROFILE) ══ */
.panel{position:absolute;inset:0;background:var(--bg);z-index:300;display:flex;flex-direction:column;overflow:hidden;}
.panel-hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:13px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.panel-back{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
.panel-title{font-family:var(--font-h);font-size:16px;font-weight:800;color:var(--text);flex:1;}
.panel-action{background:rgba(212,255,0,.1);border:1px solid var(--volt);color:var(--volt);width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ══ CONV LIST ══ */
#conv-list{flex:1;overflow-y:auto;}
.conv-item{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;transition:background .2s;border-bottom:1px solid var(--border);}
.conv-item:active{background:var(--s1);}
.conv-av{width:44px;height:44px;border-radius:50%;background:var(--s2);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;overflow:hidden;}
.conv-av img{width:100%;height:100%;object-fit:cover;}
.conv-info{flex:1;min-width:0;}
.conv-name{font-weight:700;font-size:13px;margin-bottom:2px;}
.conv-last{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.conv-time{font-size:10px;color:var(--muted);}
.conv-unread{background:var(--volt);color:#000;border-radius:100px;font-size:9px;font-weight:800;padding:2px 6px;}
.empty-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);}
.empty-panel .icon{font-size:40px;}
.empty-panel p{font-size:12px;text-align:center;max-width:200px;line-height:1.6;}

/* ══ CHAT ══ */
#chat-panel{position:absolute;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;}
.chat-hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:11px 12px;display:flex;align-items:center;gap:9px;flex-shrink:0;}
.chat-back{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.chat-av{width:34px;height:34px;border-radius:50%;background:var(--s2);border:2px solid var(--volt);display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;flex-shrink:0;}
.chat-av img{width:100%;height:100%;object-fit:cover;}
.chat-name{font-family:var(--font-h);font-size:14px;font-weight:800;color:var(--text);flex:1;}
.chat-prof-btn{background:rgba(212,255,0,.1);border:1px solid var(--border);color:var(--volt);padding:4px 10px;border-radius:100px;font-size:10px;font-weight:700;cursor:pointer;}
#chat-msgs{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:7px;}
.msg-bub{max-width:74%;display:flex;flex-direction:column;gap:2px;}
.msg-bub.mine{align-self:flex-end;align-items:flex-end;}
.msg-bub.theirs{align-self:flex-start;align-items:flex-start;}
.msg-content{padding:9px 12px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word;cursor:pointer;position:relative;}
.msg-bub.mine .msg-content{background:var(--volt);color:#000;border-bottom-right-radius:4px;}
.msg-bub.theirs .msg-content{background:var(--s2);color:var(--text);border-bottom-left-radius:4px;}
.msg-content.blocked{background:var(--s3);color:var(--muted);font-style:italic;cursor:default;}
.msg-media{max-width:190px;max-height:190px;border-radius:12px;object-fit:cover;cursor:pointer;}
.msg-time{font-size:9px;color:var(--muted);padding:0 3px;}
.msg-reaction{font-size:13px;}
.emoji-picker{position:absolute;bottom:38px;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:7px 10px;display:flex;gap:8px;z-index:10;box-shadow:0 4px 20px rgba(0,0,0,.6);left:50%;transform:translateX(-50%);}
.emoji-picker span{font-size:18px;cursor:pointer;transition:transform .15s;}
.emoji-picker span:active{transform:scale(1.3);}
.chat-inp-row{padding:8px 10px 14px;background:var(--s1);border-top:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.chat-inp-row .inp{flex:1;border-radius:100px;padding:9px 13px;font-size:13px;}
.chat-media-btn{width:34px;height:34px;border-radius:50%;background:var(--s2);border:1px solid var(--border);color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chat-send{width:34px;height:34px;border-radius:50%;background:var(--volt);border:none;color:#000;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;}
.chat-send:active{transform:scale(1.1);}

/* ══ NEW CONV ══ */
#new-conv-modal{position:fixed;inset:0;z-index:8200;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;}
.new-conv-sheet{background:var(--s1);border-radius:22px 22px 0 0;border-top:1px solid var(--border);padding:20px;width:100%;max-width:460px;animation:su .25s ease;}
.new-conv-sheet h3{font-family:var(--font-h);font-size:16px;margin-bottom:11px;}
#usr-search-res{display:flex;flex-direction:column;gap:6px;margin-top:9px;max-height:220px;overflow-y:auto;}
.usr-res{display:flex;align-items:center;gap:9px;padding:9px;border-radius:10px;background:var(--s2);cursor:pointer;transition:background .2s;}
.usr-res:active{background:var(--s3);}
.usr-res-av{width:34px;height:34px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:14px;}
.usr-res-name{font-size:13px;font-weight:700;}

/* ══ NOTIF ══ */
#notif-list{flex:1;overflow-y:auto;}
.notif-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.notif-item.unread{background:rgba(212,255,0,.04);}
.notif-item:active{background:var(--s1);}
.notif-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.notif-icon.like{background:rgba(255,48,128,.2);}
.notif-icon.follow{background:rgba(212,255,0,.15);}
.notif-icon.message{background:rgba(0,212,255,.15);}
.notif-txt{flex:1;font-size:12px;line-height:1.5;}
.notif-txt strong{color:var(--volt);}
.notif-time{font-size:10px;color:var(--muted);}

/* ══ PROFILE ══ */
.prof-body{flex:1;overflow-y:auto;padding:18px 14px;}
.prof-top{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.prof-av{width:68px;height:68px;border-radius:50%;border:3px solid var(--volt);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;flex-shrink:0;}
.prof-av img{width:100%;height:100%;object-fit:cover;}
.prof-stats{display:flex;gap:18px;flex:1;}
.prof-stat{display:flex;flex-direction:column;align-items:center;gap:2px;}
.prof-stat-n{font-family:var(--font-h);font-size:17px;font-weight:800;color:var(--volt);}
.prof-stat-l{font-size:9px;color:var(--muted);}
.prof-acts{display:flex;gap:7px;margin-bottom:14px;}
.prof-acts .btn-v{flex:1;padding:9px;}
.prof-acts .btn-ghost{flex:1;padding:9px;}
.prof-bio{font-size:12px;color:var(--muted2);line-height:1.6;margin-bottom:14px;}
.prof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.prof-thumb{aspect-ratio:9/16;background:var(--s2);border-radius:3px;overflow:hidden;cursor:pointer;position:relative;}
.prof-thumb video{width:100%;height:100%;object-fit:cover;}
.prof-thumb .lk-ov{position:absolute;bottom:3px;left:3px;font-size:9px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.9);}

/* ══ SV (STORY VIEWER) ══ */
#sv{position:fixed;inset:0;z-index:9000;background:#000;display:flex;align-items:center;justify-content:center;}
#sv video{height:100vh;max-width:100%;object-fit:contain;}
.sv-prog{position:absolute;top:8px;left:10px;right:10px;height:3px;background:rgba(255,255,255,.2);border-radius:100px;overflow:hidden;}
.sv-fill{height:100%;background:var(--volt);width:0%;}
.sv-user{position:absolute;top:19px;left:12px;font-weight:700;font-size:12px;text-shadow:0 1px 5px rgba(0,0,0,.9);}
.sv-priv{position:absolute;top:19px;right:46px;font-size:10px;background:rgba(0,0,0,.5);padding:3px 8px;border-radius:100px;color:var(--muted);}
.sv-close{position:absolute;top:13px;right:10px;background:rgba(0,0,0,.4);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ══ REPORT ══ */
#rep-modal{position:fixed;inset:0;z-index:8100;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;}
.rep-sheet{background:var(--s1);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:18px;width:100%;max-width:460px;animation:su .25s ease;}
.rep-sheet h3{font-family:var(--font-h);font-size:16px;margin-bottom:10px;}
.rep-reasons{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.rep-r{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:12px;cursor:pointer;text-align:left;transition:all .2s;}
.rep-r:active{border-color:var(--pink);background:rgba(255,48,128,.08);}
.rep-cancel{width:100%;padding:10px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;}

/* ══ UPLOAD ══ */
#upload-panel{position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.8);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;padding:14px;}

/* ══ TOAST ══ */
#toast{position:fixed;bottom:calc(var(--nav-h) + 14px);left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border);border-radius:100px;padding:9px 18px;font-size:12px;font-weight:700;z-index:9999;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-8px);}
#toast.ok{border-color:var(--volt);color:var(--volt);}
#toast.err{border-color:var(--pink);color:var(--pink);}
#toast.info{border-color:var(--cyan);color:var(--cyan);}

/* ══ SUPABASE CONFIG ══ */
#sb-cfg{position:fixed;inset:0;z-index:8300;background:rgba(0,0,0,.8);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;padding:16px;}
</style>
</head>

<script>
// ══════════════════════════════════════
// CONFIG SUPABASE
// ══════════════════════════════════════
let SURL=localStorage.getItem('vc_url')||'https://czdfoqgcjbsoupekpxpg.supabase.co';
let SKEY=localStorage.getItem('vc_key')||'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6ZGZvcWdjamJzb3VwZWtweHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzQ3MzgsImV4cCI6MjA4OTAxMDczOH0.ANivcmm64cYQCZZiFrCpduigWytloZSzwJ1vi1BbOy0';
let sb=null,sbReady=false;
function initSB(){
  if(!SURL||!SKEY)return;
  try{sb=supabase.createClient(SURL,SKEY);sbReady=true;}catch(e){sbReady=false;}
}
initSB();
function saveSbCfg(){
  SURL=document.getElementById('sb-url-inp').value.trim();
  SKEY=document.getElementById('sb-key-inp').value.trim();
  localStorage.setItem('vc_url',SURL);localStorage.setItem('vc_key',SKEY);
  initSB();document.getElementById('sb-cfg').classList.add('h');
  toast(sbReady?'Supabase connecté ✅':'Vérifie tes clés',sbReady?'ok':'err');
}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let user=null,lang='fr',authMode='login';
let camStream=null,mediaRecorder=null,recChunks=[],recTimer=null,recElapsed=0;
let maxDur=10,facingMode='user',currentFilter='none',currentDeform='none';
let clipBlob=null,clipVis='public';
let repTarget=null,svTimer=null;
let currentConvId=null,currentConvUser=null;
let demoStories=[],demoVideos=[];
let liked=JSON.parse(localStorage.getItem('vc_liked')||'[]');
let seen=JSON.parse(localStorage.getItem('vc_seen')||'[]');
let follows=JSON.parse(localStorage.getItem('vc_follows')||'[]');
let badwords=[];
let rtChan=null;
let animFrame=null;
let flashOn=false;

// ══════════════════════════════════════
// FILTERS COLOR
// ══════════════════════════════════════
const COLOR_FILTERS=[
  {id:'none',name:'Normal',css:'none',icon:'☀️'},
  {id:'vivid',name:'Vivid',css:'saturate(2.2) contrast(1.1)',icon:'🌈'},
  {id:'noir',name:'Noir',css:'grayscale(1) contrast(1.4)',icon:'⚫'},
  {id:'warm',name:'Warm',css:'sepia(.5) saturate(1.4)',icon:'🌅'},
  {id:'cool',name:'Cool',css:'hue-rotate(200deg) saturate(1.3)',icon:'❄️'},
  {id:'glow',name:'Glow',css:'brightness(1.25) saturate(1.6)',icon:'✨'},
  {id:'retro',name:'Retro',css:'sepia(.7) hue-rotate(-20deg) contrast(.9)',icon:'📼'},
  {id:'neon',name:'Neon',css:'saturate(3) brightness(1.1) hue-rotate(90deg)',icon:'⚡'},
];

// ══════════════════════════════════════
// DEFORMATION FILTERS (Canvas SVG)
// ══════════════════════════════════════
const DEFORM_FILTERS=[
  {id:'none',name:'Normal',icon:'😐',svg:''},
  {id:'bignose',name:'Gros nez',icon:'👃',svg:`<feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"/>`},
  {id:'bigface',name:'Big face',icon:'🤯',svg:'scale'},
  {id:'longeyes',name:'Gros yeux',icon:'👀',svg:'eyes'},
  {id:'long',name:'Allongé',icon:'🪄',svg:'long'},
  {id:'mirror',name:'Miroir',icon:'🪞',svg:'mirror'},
];

function buildFilters(){
  const el=document.getElementById('cam-filters');
  const all=[...COLOR_FILTERS,...DEFORM_FILTERS.filter(f=>f.id!=='none')];
  el.innerHTML=all.map(f=>`
    <div class="filt-btn" onclick="applyFilter('${f.id}')">
      <div class="filt-circle ${(f.id===currentFilter||f.id===currentDeform)?'on':''}" id="fp-${f.id}">${f.icon}</div>
      <span class="filt-label">${f.name}</span>
    </div>`).join('');
}

function applyFilter(id){
  const isColor=COLOR_FILTERS.find(f=>f.id===id);
  const isDeform=DEFORM_FILTERS.find(f=>f.id===id);
  document.querySelectorAll('.filt-circle').forEach(el=>el.classList.remove('on'));
  document.getElementById('fp-'+id)?.classList.add('on');
  if(isColor){
    currentFilter=id;
    document.getElementById('cam-preview').style.filter=isColor.css;
    document.getElementById('cam-canvas').style.filter=isColor.css;
  }
  if(isDeform){
    currentDeform=id;
    startDeformCanvas();
  }
}

function resetFilter(){currentFilter='none';currentDeform='none';document.getElementById('cam-preview').style.filter='none';buildFilters();stopDeformCanvas();showRealPreview();}

// ══════════════════════════════════════
// CANVAS DEFORMATION
// ══════════════════════════════════════
let deformRunning=false;
function startDeformCanvas(){
  const vid=document.getElementById('cam-preview');
  const canvas=document.getElementById('cam-canvas');
  const ctx=canvas.getContext('2d');
  vid.style.display='none';
  canvas.style.display='block';
  deformRunning=true;
  function draw(){
    if(!deformRunning)return;
    canvas.width=canvas.offsetWidth;
    canvas.height=canvas.offsetHeight;
    const w=canvas.width,h=canvas.height;
    ctx.clearRect(0,0,w,h);
    if(currentDeform==='mirror'){
      ctx.save();ctx.scale(-1,1);ctx.drawImage(vid,-w,0,w,h);ctx.restore();
      ctx.save();ctx.drawImage(vid,0,0,w/2,h,0,0,w/2,h);ctx.restore();
      ctx.save();ctx.scale(-1,1);ctx.drawImage(vid,-w/2,0,w/2,h,0,0,w/2,h);ctx.restore();
    } else if(currentDeform==='long'){
      ctx.drawImage(vid,w*.1,0,w*.8,h,0,0,w,h);
    } else if(currentDeform==='bigface'){
      const cx=w/2,cy=h/2,r=Math.min(w,h)*.45;
      ctx.save();
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();
      ctx.drawImage(vid,cx-r*1.3,cy-r*1.3,r*2.6,r*2.6);
      ctx.restore();
      ctx.drawImage(vid,0,0,w,h*.15,0,0,w,h*.15);
      ctx.drawImage(vid,0,h*.85,w,h*.15,0,h*.85,w,h*.15);
    } else if(currentDeform==='longeyes'){
      ctx.drawImage(vid,0,0,w,h);
      const ey=h*.32,eh=h*.14;
      ctx.save();
      ctx.beginPath();ctx.rect(0,ey-eh*.3,w,eh*1.6);ctx.clip();
      ctx.drawImage(vid,0,ey,w,eh,0,ey-eh*.3,w,eh*1.6);
      ctx.restore();
    } else if(currentDeform==='bignose'){
      ctx.drawImage(vid,0,0,w,h);
      const nx=w*.35,ny=h*.45,nw=w*.3,nh=h*.2;
      ctx.save();
      ctx.beginPath();ctx.ellipse(w/2,h*.55,nw*.7,nh*.7,0,0,Math.PI*2);ctx.clip();
      ctx.drawImage(vid,nx,ny,nw,nh,nx-nw*.2,ny-nh*.2,nw*1.4,nh*1.4);
      ctx.restore();
    } else {
      ctx.drawImage(vid,0,0,w,h);
    }
    const colorF=COLOR_FILTERS.find(f=>f.id===currentFilter);
    canvas.style.filter=colorF?colorF.css:'none';
    animFrame=requestAnimationFrame(draw);
  }
  draw();
}
function stopDeformCanvas(){
  deformRunning=false;
  if(animFrame)cancelAnimationFrame(animFrame);
  animFrame=null;
}
function showRealPreview(){
  document.getElementById('cam-preview').style.display='block';
  document.getElementById('cam-canvas').style.display='none';
  stopDeformCanvas();
}

async function openCamera(){

async function startCamera(){
  if(camStream)camStream.getTracks().forEach(t=>t.stop());
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:720},height:{ideal:1280}},audio:true});
    const vid=document.getElementById('cam-preview');
    vid.srcObject=camStream;vid.style.display='block';
    document.getElementById('cam-canvas').style.display='none';
    stopDeformCanvas();
    vid.style.filter=COLOR_FILTERS.find(f=>f.id===currentFilter)?.css||'none';
  }catch(e){toast('Caméra non accessible','err');document.getElementById('cam-modal').classList.add('h');}
}
function closeCamera(){
  stopDeformCanvas();showRealPreview();
  if(camStream)camStream.getTracks().forEach(t=>t.stop());
  camStream=null;document.getElementById('cam-modal').classList.add('h');stopRecord(false);
}
function flipCamera(){facingMode=facingMode==='user'?'environment':'user';startCamera();}
function toggleFlash(){
  flashOn=!flashOn;
  document.getElementById('flash-btn').style.color=flashOn?'var(--volt)':'white';
  if(camStream){
    const track=camStream.getVideoTracks()[0];
    if(track?.getCapabilities()?.torch)track.applyConstraints({advanced:[{torch:flashOn}]}).catch(()=>{});
  }
}
function setDur(d){maxDur=d;document.getElementById('dur-10').classList.toggle('on',d===10);document.getElementById('dur-20').classList.toggle('on',d===20);}
function toggleRecord(){if(mediaRecorder&&mediaRecorder.state==='recording')stopRecord(true);else startRecord();}
function startRecord(){
  if(!camStream)return;recChunks=[];recElapsed=0;
  const useCanvas=currentDeform!=='none';
  let mime='video/webm;codecs=vp9,opus';
  if(!MediaRecorder.isTypeSupported(mime))mime='video/webm';
  if(!MediaRecorder.isTypeSupported(mime))mime='';
  const stream=useCanvas
    ?document.getElementById('cam-canvas').captureStream(30)
    :camStream;
  if(useCanvas){const audioTrack=camStream.getAudioTracks()[0];if(audioTrack)stream.addTrack(audioTrack);}
  mediaRecorder=new MediaRecorder(stream,mime?{mimeType:mime}:{});
  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
  mediaRecorder.onstop=()=>finishRecord();mediaRecorder.start(100);
  document.getElementById('rec-btn').classList.add('recording');
  document.getElementById('rec-timer').classList.remove('h');
  document.getElementById('rec-prog').classList.remove('h');
  document.getElementById('rec-prog-fill').style.width='0%';
  const start=Date.now();
  recTimer=setInterval(()=>{
    recElapsed=(Date.now()-start)/1000;
    const pct=Math.min((recElapsed/maxDur)*100,100);
    document.getElementById('rec-prog-fill').style.width=pct+'%';
    document.getElementById('rec-timer').textContent='⏺ '+recElapsed.toFixed(1)+'s';
    if(recElapsed>=maxDur)stopRecord(true);
  },100);
}
function stopRecord(save){
  clearInterval(recTimer);
  document.getElementById('rec-btn').classList.remove('recording');
  document.getElementById('rec-timer').classList.add('h');
  document.getElementById('rec-prog').classList.add('h');
  if(mediaRecorder&&mediaRecorder.state==='recording'){
    if(save)mediaRecorder.stop();
    else{mediaRecorder.onstop=null;mediaRecorder.stop();recChunks=[];}
  }
}
function finishRecord(){
  if(!recChunks.length)return;
  clipBlob=new Blob(recChunks,{type:'video/webm'});
  closeCamera();openPreview(clipBlob);
}
function handleGallery(e){const f=e.target.files[0];if(!f)return;closeCamera();openPreview(f);}

  if(ue){
    toast('Upload échoué : '+ue.message,'err');

  }
  const{data:urlData}=sb.storage.from('stories').getPublicUrl(path);

  setPrevSt('Finalisation...',80);
  const expires=new Date(Date.now()+86400000).toISOString();
  const{error:ie}=await sb.from('clips').insert({
    user_id:user.id,
    title,
    video_url:publicUrl,
    duration_seconds:Math.ceil(recElapsed||maxDur),
    visibility:clipVis,
    expires_at:expires
  });
  if(ie){toast('Erreur DB : '+ie.message,'err');btn.disabled=false;document.getElementById('prev-prog').classList.add('h');return;}
  setPrevSt('Publié ! ⚡',100);
  setTimeout(()=>document.getElementById('prev-prog').classList.add('h'),800);
  document.getElementById('preview-modal').classList.add('h');
  document.getElementById('clip-title').value='';
  toast(L().done,'ok');renderStories();renderFeed();btn.disabled=false;
}

async function renderFeed(){

    try{
      const{data,error}=await sb.from('clips').select('*,profiles(username,avatar_url)').order('created_at',{ascending:false});
      if(error)throw error;
      videos=(data||[]).filter(v=>!v.hidden);

  if(!videos.length){feed.innerHTML=`<div class="empty-feed"><div class="icon">🎬</div><p>${L().no_vids}</p></div>`;return;}
  videos.forEach(v=>feed.appendChild(buildCard(v)));
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{const v=e.target.querySelector('video');if(!v)return;if(e.isIntersecting)v.play().catch(()=>{});else{v.pause();v.currentTime=0;}});},{threshold:.6});

}
function buildCard(v){

        <span class="vc-uname" onclick="openProfile('${v.user_id}')">@${esc(v.profiles?.username||'?')}</span>
        ${!isOwn?`<button class="follow-btn-inline ${isFollowing?'on':''}" onclick="toggleFollow('${v.user_id}',this)">${isFollowing?L().following:L().follow}</button>`:''}
      </div>
      <div class="vc-title">${esc(v.title)}</div>
    </div>
    <div class="vc-actions">
      <div class="va" onclick="toggleLike('${v.id}',this)"><button class="va-ic ${isLiked?'liked':''}">${isLiked?'❤️':'🤍'}</button><span class="lc">${v.like_count||0}</span></div>
      <div class="va" onclick="openRep('${v.id}')"><button class="va-ic">🚩</button><span>Report</span></div>
    </div>`;
  el.querySelector('video').addEventListener('click',function(){if(this.paused)this.play();else this.pause();});
  return el;
}

// ══════════════════════════════════════
// FOLLOW
// ══════════════════════════════════════
async function toggleFollow(uid,btn){
  if(!user){if(sbReady)document.getElementById('auth-modal').classList.remove('h');return;}
  const isF=follows.includes(uid);
  if(isF){if(sbReady)await sb.from('follows').delete().eq('follower_id',user.id).eq('following_id',uid);follows=follows.filter(x=>x!==uid);btn.textContent=L().follow;btn.classList.remove('on');}
  else{if(sbReady)await sb.from('follows').insert({follower_id:user.id,following_id:uid});follows.push(uid);btn.textContent=L().following;btn.classList.add('on');}
  localStorage.setItem('vc_follows',JSON.stringify(follows));
}

// ══════════════════════════════════════
// LIKES
// ══════════════════════════════════════
async function toggleLike(id,el){
  const btn=el.querySelector('button'),cnt=el.querySelector('.lc'),isL=liked.includes(id);
  if(isL){if(sbReady&&user)await sb.from('likes').delete().eq('user_id',user.id).eq('video_id',id);liked=liked.filter(x=>x!==id);btn.textContent='🤍';btn.classList.remove('liked');cnt.textContent=Math.max(0,parseInt(cnt.textContent)-1);}
  else{if(sbReady&&user)await sb.from('likes').insert({user_id:user.id,video_id:id});liked.push(id);btn.textContent='❤️';btn.classList.add('liked');cnt.textContent=parseInt(cnt.textContent)+1;}
  localStorage.setItem('vc_liked',JSON.stringify(liked));
}

// ══════════════════════════════════════
// REPORT
// ══════════════════════════════════════
function openRep(id){repTarget=id;document.getElementById('rep-reasons').innerHTML=L().reasons.map(r=>`<button class="rep-r" onclick="doRep('${r}')">${r}</button>`).join('');document.getElementById('rep-modal').classList.remove('h');}
async function doRep(reason){
  document.getElementById('rep-modal').classList.add('h');
  if(!sbReady){toast(L().rep_sent,'ok');return;}
  if(!user){toast(L().need_login,'err');return;}
  await sb.from('reports').insert({reporter_id:user.id,video_id:repTarget,reason});
  toast(L().rep_sent,'ok');
  const{data}=await sb.from('clips').select('hidden').eq('id',repTarget).single();
  if(data?.hidden){toast(L().rep_hidden,'err');document.querySelector(`.vc[data-id="${repTarget}"]`)?.remove();}
}

// ══════════════════════════════════════
// PROFILE
// ══════════════════════════════════════
async function openProfile(uid){
  document.getElementById('profile-panel').classList.remove('h');
  const body=document.getElementById('prof-body');
  body.innerHTML='<p style="color:var(--muted);text-align:center;padding:40px;font-size:13px;">Chargement...</p>';
  document.getElementById('prof-back').onclick=()=>document.getElementById('profile-panel').classList.add('h');
  let profile,clips,fc=0,fgc=0;
  if(sbReady){
    const{data:p}=await sb.from('profiles').select('*').eq('id',uid).single();profile=p;fc=p?.follower_count||0;fgc=p?.following_count||0;
    const{data:v}=await sb.from('clips').select('*').eq('user_id',uid).eq('hidden',false).order('created_at',{ascending:false});clips=v||[];
  }else{profile={username:'Moi',bio:'',follower_count:0,following_count:0};clips=demoVideos.filter(v=>v.user_id===uid);}
  if(!profile){body.innerHTML='<p style="color:var(--muted);text-align:center;padding:40px;">Introuvable</p>';return;}
  document.getElementById('prof-hdr-name').textContent='@'+esc(profile.username||'?');
  const isOwn=user&&uid===user.id,isF=follows.includes(uid),l=L();
  body.innerHTML=`
    <div class="prof-top">
      <div class="prof-av">${profile.avatar_url?`<img src="${profile.avatar_url}"/>`:'👤'}</div>
      <div class="prof-stats">
        <div class="prof-stat"><span class="prof-stat-n">${clips.length}</span><span class="prof-stat-l">${l.clips}</span></div>
        <div class="prof-stat"><span class="prof-stat-n">${fc}</span><span class="prof-stat-l">${l.followers}</span></div>
        <div class="prof-stat"><span class="prof-stat-n">${fgc}</span><span class="prof-stat-l">${l.followings}</span></div>
      </div>
    </div>
    <div class="prof-acts">
      ${isOwn
        ?`<button class="btn-ghost" style="flex:1;padding:9px;" onclick="toast('Bientôt disponible','info')">✏️ Modifier</button>`
        :`<button class="${isF?'btn-ghost':'btn-v'}" style="flex:1;padding:9px;" id="pf-btn" onclick="toggleFollowProf('${uid}',this)">${isF?l.following:l.follow}</button>
          <button class="btn-ghost" style="flex:1;padding:9px;" onclick="openDM('${uid}','${esc(profile.username||'?')}')">💬 Message</button>`
      }
    </div>
    ${profile.bio?`<div class="prof-bio">${esc(profile.bio)}</div>`:''}
    <div class="prof-grid" id="pg"></div>`;
  const grid=document.getElementById('pg');
  if(!clips.length){grid.innerHTML='<p style="color:var(--muted);font-size:11px;text-align:center;padding:16px;grid-column:1/-1;">Aucun clip</p>';return;}
  clips.forEach(v=>{
    const t=document.createElement('div');t.className='prof-thumb';
    t.innerHTML=`<video src="${v.video_url}" muted preload="none"></video><div class="lk-ov">❤️${v.like_count||0}</div>`;
    t.onmouseenter=()=>t.querySelector('video').play();t.onmouseleave=()=>{t.querySelector('video').pause();t.querySelector('video').currentTime=0;};
    grid.appendChild(t);
  });
}
async function toggleFollowProf(uid,btn){
  const isF=follows.includes(uid);
  if(isF){if(sbReady&&user)await sb.from('follows').delete().eq('follower_id',user.id).eq('following_id',uid);follows=follows.filter(x=>x!==uid);}
  else{if(sbReady&&user)await sb.from('follows').insert({follower_id:user.id,following_id:uid});follows.push(uid);}
  localStorage.setItem('vc_follows',JSON.stringify(follows));
  const isNowF=follows.includes(uid);btn.textContent=isNowF?L().following:L().follow;
  btn.className=(isNowF?'btn-ghost':'btn-v')+' ';btn.style.flex='1';btn.style.padding='9px';
}

// ══════════════════════════════════════
// MESSAGES
// ══════════════════════════════════════
async function loadConversations(){
  const list=document.getElementById('conv-list');list.innerHTML='';
  if(!sbReady||!user){
    list.innerHTML=`<div class="empty-panel"><div class="icon">💬</div><p>${sbReady?L().no_convs.replace('\n','<br>'):'Connecte-toi pour\naccéder aux messages'.replace('\n','<br>')}</p></div>`;
    return;
  }
  const{data:convs}=await sb.from('conversations')
    .select('*,pa:profiles!conversations_user_a_fkey(username,avatar_url),pb:profiles!conversations_user_b_fkey(username,avatar_url)')
    .or(`user_a.eq.${user.id},user_b.eq.${user.id}`)
    .order('last_message_at',{ascending:false});
  if(!convs?.length){list.innerHTML=`<div class="empty-panel"><div class="icon">💬</div><p>${L().no_convs.replace('\n','<br>')}</p></div>`;return;}
  convs.forEach(c=>{
    const other=c.user_a===user.id?c.pb:c.pa;
    const unread=c.user_a===user.id?c.unread_a:c.unread_b;
    const el=document.createElement('div');el.className='conv-item';
    el.innerHTML=`<div class="conv-av">${other?.avatar_url?`<img src="${other.avatar_url}"/>`:'👤'}</div>
      <div class="conv-info"><div class="conv-name">${esc(other?.username||'?')}</div><div class="conv-last">${esc(c.last_message||'...')}</div></div>
      <div class="conv-meta"><span class="conv-time">${fmtTime(c.last_message_at)}</span>${unread>0?`<span class="conv-unread">${unread}</span>`:''}</div>`;
    el.onclick=()=>openChat(c.id,c.user_a===user.id?c.user_b:c.user_a,other?.username||'?',other?.avatar_url);
    list.appendChild(el);
  });
}
async function openDM(uid,username){
  if(!sbReady||!user){toast(L().need_login,'err');if(sbReady)document.getElementById('auth-modal').classList.remove('h');return;}
  let{data:conv}=await sb.from('conversations').select('*').or(`and(user_a.eq.${user.id},user_b.eq.${uid}),and(user_a.eq.${uid},user_b.eq.${user.id})`).maybeSingle();
  if(!conv){const{data:nc,error}=await sb.from('conversations').insert({user_a:user.id,user_b:uid}).select().single();if(error){toast(error.message,'err');return;}conv=nc;}
  document.getElementById('profile-panel').classList.add('h');
  openChat(conv.id,uid,username,null);showPanel('msg');
}
function openChat(convId,otherUid,otherName,otherAvatar){
  currentConvId=convId;currentConvUser={id:otherUid,username:otherName,avatar:otherAvatar};
  document.getElementById('chat-panel').classList.remove('h');
  document.getElementById('chat-name').textContent=esc(otherName);
  const av=document.getElementById('chat-av');av.innerHTML=otherAvatar?`<img src="${otherAvatar}"/>`:'👤';
  loadMessages(convId);
  if(sbReady&&user){sb.from('conversations').select('user_a').eq('id',convId).single().then(({data})=>{if(data){const f=data.user_a===user.id?'unread_a':'unread_b';sb.from('conversations').update({[f]:0}).eq('id',convId).then();}});}
}
function closeChat(){document.getElementById('chat-panel').classList.add('h');currentConvId=null;}
function viewChatProf(){if(currentConvUser)openProfile(currentConvUser.id);}
async function loadMessages(convId){
  const msgs=document.getElementById('chat-msgs');msgs.innerHTML='';
  if(!sbReady||!user)return;
  const{data}=await sb.from('messages').select('*,profiles(username)').eq('conversation_id',convId).order('created_at',{ascending:true});
  (data||[]).forEach(m=>msgs.appendChild(buildBubble(m)));
  msgs.scrollTop=msgs.scrollHeight;
}
function buildBubble(m){
  const isMine=user&&m.sender_id===user.id;
  const el=document.createElement('div');el.className='msg-bub '+(isMine?'mine':'theirs');el.dataset.id=m.id;
  let inner='';
  if(m.media_url){if(m.media_type==='image')inner+=`<img src="${m.media_url}" class="msg-media" onclick="window.open('${m.media_url}','_blank')"/>`;else if(m.media_type==='video')inner+=`<video src="${m.media_url}" class="msg-media" controls></video>`;}
  if(m.content){inner+=`<div class="msg-content${m.is_blocked?' blocked':''}" onclick="showEmoji(this,'${m.id}')">${esc(m.is_blocked?L().msg_blocked:m.content)}</div>`;}
  if(m.reaction)inner+=`<div class="msg-reaction">${m.reaction}</div>`;
  inner+=`<span class="msg-time">${fmtTime(m.created_at)}</span>`;
  el.innerHTML=inner;return el;
}
function showEmoji(el,msgId){
  document.querySelectorAll('.emoji-picker').forEach(p=>p.remove());
  const picker=document.createElement('div');picker.className='emoji-picker';
  ['❤️','😂','😮','😢','🔥','👏'].forEach(e=>{
    const s=document.createElement('span');s.textContent=e;
    s.onclick=async()=>{picker.remove();if(sbReady&&user)await sb.from('messages').update({reaction:e}).eq('id',msgId);loadMessages(currentConvId);};
    picker.appendChild(s);
  });
  el.style.position='relative';el.appendChild(picker);
  setTimeout(()=>document.addEventListener('click',function h(){picker.remove();document.removeEventListener('click',h);},{once:true}),100);
}
function filterMsg(text){if(!text)return text;let f=text;badwords.forEach(w=>{const re=new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');f=f.replace(re,'***');});return f;}
function hasBad(text){if(!text)return false;return badwords.some(w=>text.toLowerCase().includes(w));}
async function sendMsg(){
  const inp=document.getElementById('chat-inp');
  let content=inp.value.trim();if(!content||!currentConvId||!user)return;
  if(hasBad(content))content=filterMsg(content);
  inp.value='';
  if(sbReady){await sb.from('messages').insert({conversation_id:currentConvId,sender_id:user.id,content});loadMessages(currentConvId);}
  else{const msgs=document.getElementById('chat-msgs');const fake={id:'d'+Date.now(),sender_id:user?.id||'demo',content,created_at:new Date().toISOString(),is_blocked:false,reaction:null};msgs.appendChild(buildBubble(fake));msgs.scrollTop=msgs.scrollHeight;}
}
async function sendMedia(e){
  const file=e.target.files[0];if(!file||!currentConvId||!user||!sbReady)return;
  const isImg=file.type.startsWith('image'),isVid=file.type.startsWith('video');
  if(!isImg&&!isVid){toast('Image ou vidéo uniquement','err');return;}
  const path=`${user.id}/${Date.now()}_${file.name}`;
  const{error}=await sb.storage.from('messages').upload(path,file,{upsert:false});
  if(error){toast(error.message,'err');return;}
  const{data:{publicUrl}}=sb.storage.from('messages').getPublicUrl(path);
  await sb.from('messages').insert({conversation_id:currentConvId,sender_id:user.id,media_url:publicUrl,media_type:isImg?'image':'video'});
  loadMessages(currentConvId);e.target.value='';
}
async function searchUsers(q){
  const res=document.getElementById('usr-search-res');res.innerHTML='';
  if(!q||!sbReady)return;
  const{data}=await sb.from('profiles').select('id,username,avatar_url').ilike('username','%'+q+'%').limit(8);
  (data||[]).filter(p=>p.id!==user?.id).forEach(p=>{
    const el=document.createElement('div');el.className='usr-res';
    el.innerHTML=`<div class="usr-res-av">${p.avatar_url?`<img src="${p.avatar_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"/>`:'👤'}</div><div class="usr-res-name">@${esc(p.username)}</div>`;
    el.onclick=()=>{document.getElementById('new-conv-modal').classList.add('h');openDM(p.id,p.username);};
    res.appendChild(el);
  });
  if(!data?.length)res.innerHTML='<p style="color:var(--muted);font-size:11px;text-align:center;padding:8px;">Aucun résultat</p>';
}

// ══════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════
async function loadNotifications(){
  const list=document.getElementById('notif-list');list.innerHTML='';
  if(!sbReady||!user){list.innerHTML=`<div class="empty-panel"><div class="icon">🔔</div><p>${L().no_notifs}</p></div>`;return;}
  const{data}=await sb.from('notifications').select('*,from:profiles!notifications_from_user_id_fkey(username,avatar_url)').eq('user_id',user.id).order('created_at',{ascending:false}).limit(50);
  if(!data?.length){list.innerHTML=`<div class="empty-panel"><div class="icon">🔔</div><p>${L().no_notifs}</p></div>`;return;}
  await sb.from('notifications').update({is_read:true}).eq('user_id',user.id).eq('is_read',false);
  document.getElementById('notif-dot').classList.remove('show');
  const l=L(),icons={like:'❤️',follow:'👤',message:'💬',report:'🚩'};
  data.forEach(n=>{
    const el=document.createElement('div');el.className='notif-item'+(n.is_read?'':' unread');
    const txt={like:`<strong>@${esc(n.from?.username||'?')}</strong> ${l.liked_notif}`,follow:`<strong>@${esc(n.from?.username||'?')}</strong> ${l.followed_notif}`,message:`<strong>@${esc(n.from?.username||'?')}</strong> ${l.msg_notif}${n.message?` : "${esc(n.message.substring(0,30))}"`:''}`};
    el.innerHTML=`<div class="notif-icon ${n.type}">${icons[n.type]||'🔔'}</div><div class="notif-txt">${txt[n.type]||esc(n.message||'')}</div><span class="notif-time">${fmtTime(n.created_at)}</span>`;
    if(n.type==='follow'&&n.from_user_id)el.onclick=()=>openProfile(n.from_user_id);
    else if(n.type==='message')el.onclick=()=>showPanel('msg');
    list.appendChild(el);
  });
}

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtTime(iso){if(!iso)return'';const d=new Date(iso),diff=(Date.now()-d)/1000;if(diff<60)return'maintenant';if(diff<3600)return Math.floor(diff/60)+'min';if(diff<86400)return Math.floor(diff/3600)+'h';return Math.floor(diff/86400)+'j';}

applyLang();
</script>
