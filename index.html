<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VoltClip ⚡</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- FFmpeg WASM -->
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

<style>
/* ===== FONTS ===== */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap');

/* ===== RESET & ROOT ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #050508;
  --surface: #0e0e14;
  --card: #13131c;
  --border: #1e1e2e;
  --volt: #c8ff00;
  --volt2: #7fff00;
  --pink: #ff2d78;
  --cyan: #00e5ff;
  --text: #f0f0f5;
  --muted: #6b6b80;
  --radius: 14px;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  overflow: hidden;
}

/* ===== AGE GATE ===== */
#age-gate {
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 28px;
  padding: 24px;
}
#age-gate .logo-big {
  font-family: var(--font-display);
  font-size: clamp(52px, 14vw, 120px);
  color: var(--volt);
  letter-spacing: 4px;
  text-shadow: 0 0 60px rgba(200,255,0,0.4);
  animation: pulse-volt 2s ease-in-out infinite;
}
@keyframes pulse-volt {
  0%,100% { text-shadow: 0 0 40px rgba(200,255,0,0.4); }
  50% { text-shadow: 0 0 80px rgba(200,255,0,0.8); }
}
#age-gate p { color: var(--muted); font-size: 15px; text-align: center; max-width: 320px; line-height: 1.6; }
#age-gate .gate-question {
  font-size: clamp(18px, 5vw, 26px);
  font-weight: 700;
  text-align: center;
}
.gate-btns { display: flex; gap: 16px; }
.gate-btns button {
  padding: 14px 40px;
  border-radius: 100px;
  border: none;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}
.gate-btns button.yes {
  background: var(--volt);
  color: #000;
}
.gate-btns button.yes:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(200,255,0,0.5); }
.gate-btns button.no {
  background: var(--surface);
  color: var(--muted);
  border: 1px solid var(--border);
}
#age-gate.hidden { display: none; }

/* ===== AUTH MODAL ===== */
#auth-modal {
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}
#auth-modal.hidden { display: none; }
.auth-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 32px;
  width: 100%; max-width: 400px;
  display: flex; flex-direction: column; gap: 20px;
}
.auth-box .logo { font-family: var(--font-display); font-size: 36px; color: var(--volt); letter-spacing: 3px; text-align: center; }
.auth-tabs { display: flex; background: var(--surface); border-radius: 100px; padding: 4px; gap: 4px; }
.auth-tabs button {
  flex: 1; padding: 10px; border-radius: 100px; border: none;
  background: transparent; color: var(--muted); font-family: var(--font-body);
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s;
}
.auth-tabs button.active { background: var(--volt); color: #000; }
.auth-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  width: 100%;
  outline: none;
  transition: border-color .2s;
}
.auth-input:focus { border-color: var(--volt); }
.btn-volt {
  background: var(--volt);
  color: #000;
  border: none;
  border-radius: 100px;
  padding: 14px;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  width: 100%;
}
.btn-volt:hover { transform: scale(1.02); box-shadow: 0 0 24px rgba(200,255,0,0.4); }
.btn-volt:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.auth-msg { font-size: 13px; color: var(--pink); text-align: center; min-height: 18px; }

/* ===== LAYOUT ===== */
#app {
  height: 100vh;
  display: grid;
  grid-template-columns: 72px 1fr;
  grid-template-rows: 1fr;
}

/* ===== SIDEBAR ===== */
#sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 0; gap: 8px;
  z-index: 100;
}
.logo-sm {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--volt);
  letter-spacing: 2px;
  margin-bottom: 12px;
  writing-mode: horizontal-tb;
}
.nav-btn {
  width: 48px; height: 48px;
  border-radius: 14px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 22px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
  position: relative;
}
.nav-btn:hover, .nav-btn.active { background: rgba(200,255,0,0.12); color: var(--volt); }
.nav-btn .tooltip {
  position: absolute; left: 60px; background: var(--card);
  color: var(--text); font-size: 12px; font-weight: 600;
  padding: 6px 10px; border-radius: 8px; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity .15s;
  border: 1px solid var(--border);
}
.nav-btn:hover .tooltip { opacity: 1; }
.sidebar-spacer { flex: 1; }
#lang-btn {
  width: 48px; height: 28px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
}
#user-avatar-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 2px solid var(--volt);
  background: var(--card);
  color: var(--volt);
  font-size: 18px;
  cursor: pointer;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}

/* ===== MAIN ===== */
#main {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ===== STORIES BAR ===== */
#stories-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px 12px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#stories-bar::-webkit-scrollbar { display: none; }
.story-thumb {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; flex-shrink: 0;
}
.story-ring {
  width: 56px; height: 56px;
  border-radius: 50%;
  padding: 2px;
  background: linear-gradient(135deg, var(--volt), var(--pink));
  position: relative;
}
.story-ring.seen { background: var(--border); }
.story-ring img, .story-ring .story-inner {
  width: 100%; height: 100%;
  border-radius: 50%;
  object-fit: cover;
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.story-label { font-size: 10px; color: var(--muted); max-width: 56px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.add-story-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; flex-shrink: 0;
}
.add-story-circle {
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 2px dashed var(--volt);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: var(--volt);
  transition: background .2s;
}
.add-story-circle:hover { background: rgba(200,255,0,0.1); }

/* ===== VIDEO FEED ===== */
#feed {
  flex: 1;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
}
#feed::-webkit-scrollbar { display: none; }
.video-card {
  height: 100%;
  scroll-snap-align: start;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  overflow: hidden;
}
.video-card video {
  height: 100%;
  max-width: 100%;
  object-fit: contain;
}
.video-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
  background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
}
.video-info {
  position: absolute; bottom: 32px; left: 20px; right: 80px;
  pointer-events: none;
}
.video-user {
  font-weight: 700; font-size: 15px; margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.video-user .at { color: var(--volt); }
.video-title { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.4; }
.video-desc { font-size: 12px; color: var(--muted); margin-top: 4px; }

.video-actions {
  position: absolute; right: 16px; bottom: 40px;
  display: flex; flex-direction: column; gap: 20px; align-items: center;
}
.vaction {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer;
}
.vaction-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  transition: background .2s, transform .15s;
  border: none; cursor: pointer; color: white;
}
.vaction-icon:hover { background: rgba(200,255,0,0.25); transform: scale(1.1); }
.vaction-icon.liked { background: rgba(255,45,120,0.3); }
.vaction span { font-size: 11px; color: rgba(255,255,255,0.7); }
.report-btn { color: rgba(255,255,255,0.5); }
.report-btn:hover { color: var(--pink); }

/* ===== UPLOAD PANEL ===== */
#upload-panel {
  position: fixed; inset: 0; z-index: 8000;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(16px);
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
#upload-panel.hidden { display: none; }
.upload-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px;
  width: 100%; max-width: 480px;
  display: flex; flex-direction: column; gap: 18px;
}
.upload-box h2 { font-family: var(--font-display); font-size: 28px; color: var(--volt); letter-spacing: 2px; }
.upload-drop {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
}
.upload-drop:hover, .upload-drop.drag { border-color: var(--volt); background: rgba(200,255,0,0.05); }
.upload-drop .icon { font-size: 40px; margin-bottom: 10px; }
.upload-drop p { color: var(--muted); font-size: 14px; }
.upload-drop strong { color: var(--text); }
.upload-progress {
  background: var(--surface);
  border-radius: 100px;
  height: 6px;
  overflow: hidden;
  display: none;
}
.upload-progress.show { display: block; }
.upload-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--volt), var(--cyan));
  width: 0%;
  transition: width .3s;
  border-radius: 100px;
}
.upload-status { font-size: 13px; color: var(--muted); text-align: center; }
.upload-actions { display: flex; gap: 12px; }
.btn-ghost {
  flex: 1; padding: 12px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: var(--font-body);
  font-weight: 600;
  cursor: pointer;
  transition: border-color .2s;
}
.btn-ghost:hover { border-color: var(--muted); }
.upload-box .btn-volt { flex: 2; }

/* ===== STORY VIEWER ===== */
#story-viewer {
  position: fixed; inset: 0; z-index: 8500;
  background: #000;
  display: flex; align-items: center; justify-content: center;
}
#story-viewer.hidden { display: none; }
#story-viewer video {
  height: 100vh;
  max-width: 100%;
  object-fit: contain;
}
.story-progress-bar {
  position: absolute; top: 12px; left: 16px; right: 16px;
  height: 3px; background: rgba(255,255,255,0.25); border-radius: 100px; overflow: hidden;
}
.story-progress-fill {
  height: 100%;
  background: var(--volt);
  width: 0%;
  transition: width linear;
}
.story-close {
  position: absolute; top: 24px; right: 16px;
  background: rgba(0,0,0,0.5); border: none;
  color: white; font-size: 22px; width: 40px; height: 40px;
  border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.story-username {
  position: absolute; top: 28px; left: 16px;
  font-weight: 700; font-size: 14px;
  text-shadow: 0 1px 6px rgba(0,0,0,0.8);
}

/* ===== TOAST ===== */
#toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 12px 24px;
  font-size: 14px; font-weight: 600;
  z-index: 99999;
  opacity: 0; pointer-events: none;
  transition: opacity .3s, transform .3s;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(-8px); }
#toast.error { border-color: var(--pink); color: var(--pink); }
#toast.success { border-color: var(--volt); color: var(--volt); }

/* ===== REPORT MODAL ===== */
#report-modal {
  position: fixed; inset: 0; z-index: 9100;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: flex-end; justify-content: center;
}
#report-modal.hidden { display: none; }
.report-sheet {
  background: var(--card);
  border-radius: 24px 24px 0 0;
  padding: 28px 24px;
  width: 100%; max-width: 480px;
  border-top: 1px solid var(--border);
}
.report-sheet h3 { font-family: var(--font-display); font-size: 22px; color: var(--text); letter-spacing: 1px; margin-bottom: 16px; }
.report-reasons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.report-reason {
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  cursor: pointer;
  text-align: left;
  transition: border-color .2s, background .2s;
}
.report-reason:hover { border-color: var(--pink); background: rgba(255,45,120,0.08); }
.report-cancel {
  width: 100%; padding: 13px; border-radius: 100px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-family: var(--font-body); font-size: 14px; cursor: pointer;
}

/* ===== EMPTY STATE ===== */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 16px; color: var(--muted);
}
.empty-state .icon { font-size: 60px; }
.empty-state p { font-size: 15px; }

/* ===== RESPONSIVE MOBILE ===== */
@media (max-width: 600px) {
  #app { grid-template-columns: 1fr; grid-template-rows: 1fr 64px; }
  #sidebar {
    order: 2;
    flex-direction: row;
    justify-content: space-around;
    padding: 0 16px;
    border-right: none;
    border-top: 1px solid var(--border);
    height: 64px;
  }
  .logo-sm { display: none; }
  .sidebar-spacer { display: none; }
  .nav-btn .tooltip { display: none; }
  #main { order: 1; }
}

/* ===== SCROLL SNAP HEIGHT ===== */
.video-card {
  height: calc(100vh - 88px); /* feed height */
}
@media (max-width: 600px) {
  .video-card { height: calc(100vh - 64px - 88px); }
}
</style>
</head>
<body>

<!-- ====== AGE GATE ====== -->
<div id="age-gate">
  <div class="logo-big">VOLTCLIP</div>
  <p id="gate-text">Ce site contient du contenu réservé aux adultes. Confirmes-tu avoir 18 ans ou plus ?</p>
  <div class="gate-question" id="gate-question">As-tu 18 ans ou plus ?</div>
  <div class="gate-btns">
    <button class="yes" onclick="confirmAge(true)" id="gate-yes">Oui, j'ai 18+</button>
    <button class="no" onclick="confirmAge(false)" id="gate-no">Non</button>
  </div>
</div>

<!-- ====== AUTH MODAL ====== -->
<div id="auth-modal" class="hidden">
  <div class="auth-box">
    <div class="logo">⚡ VOLTCLIP</div>
    <div class="auth-tabs">
      <button class="active" id="tab-login" onclick="switchTab('login')">Connexion</button>
      <button id="tab-signup" onclick="switchTab('signup')">Inscription</button>
    </div>
    <div id="auth-fields" style="display:flex;flex-direction:column;gap:12px;">
      <input class="auth-input" id="auth-email" type="email" placeholder="Email"/>
      <input class="auth-input" id="auth-username" type="text" placeholder="Pseudo" style="display:none"/>
      <input class="auth-input" id="auth-password" type="password" placeholder="Mot de passe"/>
    </div>
    <p class="auth-msg" id="auth-msg"></p>
    <button class="btn-volt" id="auth-submit-btn" onclick="submitAuth()">Se connecter</button>
    <p style="font-size:12px;color:var(--muted);text-align:center;" id="auth-switch-text">
      Pas encore de compte ? <span style="color:var(--volt);cursor:pointer" onclick="switchTab('signup')">S'inscrire</span>
    </p>
  </div>
</div>

<!-- ====== REPORT MODAL ====== -->
<div id="report-modal" class="hidden">
  <div class="report-sheet">
    <h3 id="report-title">Signaler</h3>
    <div class="report-reasons" id="report-reasons"></div>
    <button class="report-cancel" onclick="closeReport()" id="report-cancel-btn">Annuler</button>
  </div>
</div>

<!-- ====== UPLOAD PANEL ====== -->
<div id="upload-panel" class="hidden">
  <div class="upload-box">
    <h2 id="upload-title">UPLOADER</h2>
    <div class="upload-drop" id="upload-drop" onclick="document.getElementById('file-input').click()">
      <div class="icon">🎬</div>
      <p><strong id="drop-strong">Clique ou glisse une vidéo ici</strong></p>
      <p id="drop-sub">MP4, MOV, AVI • Compression automatique</p>
    </div>
    <input type="file" id="file-input" accept="video/*" style="display:none" onchange="handleFileSelect(event)"/>
    <div>
      <input class="auth-input" id="video-title-input" placeholder="Titre de la vidéo" maxlength="100"/>
    </div>
    <div id="story-checkbox-wrap" style="display:flex;align-items:center;gap:10px;margin-top:4px;">
      <input type="checkbox" id="is-story" style="width:18px;height:18px;accent-color:var(--volt)"/>
      <label for="is-story" id="story-label" style="font-size:14px;cursor:pointer;">Poster comme Story (max 20s)</label>
    </div>
    <div class="upload-progress" id="upload-progress">
      <div class="upload-progress-bar" id="upload-progress-bar"></div>
    </div>
    <p class="upload-status" id="upload-status"></p>
    <div class="upload-actions">
      <button class="btn-ghost" onclick="closeUpload()">Annuler</button>
      <button class="btn-volt" id="upload-submit-btn" onclick="submitUpload()" disabled>Publier</button>
    </div>
  </div>
</div>

<!-- ====== STORY VIEWER ====== -->
<div id="story-viewer" class="hidden">
  <video id="story-video" playsinline autoplay muted></video>
  <div class="story-progress-bar"><div class="story-progress-fill" id="story-fill"></div></div>
  <div class="story-username" id="story-username"></div>
  <button class="story-close" onclick="closeStoryViewer()">✕</button>
</div>

<!-- ====== TOAST ====== -->
<div id="toast"></div>

<!-- ====== APP ====== -->
<div id="app" style="display:none">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="logo-sm">⚡</div>
    <button class="nav-btn active" id="nav-home" onclick="showSection('feed')" title="Accueil">
      🏠<span class="tooltip" id="tt-home">Accueil</span>
    </button>
    <button class="nav-btn" id="nav-upload" onclick="requireAuth(openUpload)" title="Upload">
      ➕<span class="tooltip" id="tt-upload">Uploader</span>
    </button>
    <div class="sidebar-spacer"></div>
    <button id="lang-btn" onclick="toggleLang()">FR</button>
    <button id="user-avatar-btn" onclick="handleAvatarClick()">👤</button>
  </nav>

  <!-- Main -->
  <div id="main">
    <!-- Stories bar -->
    <div id="stories-bar"></div>
    <!-- Video feed -->
    <div id="feed"></div>
  </div>
</div>

<!-- ====== SCRIPT ====== -->
<script>
// ============================
// CONFIG — REMPLACE ICI
// ============================
const SUPABASE_URL = 'REMPLACE_PAR_TON_URL_SUPABASE';
const SUPABASE_ANON_KEY = 'REMPLACE_PAR_TA_CLE_ANON';
// ============================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== STATE =====
let currentUser = null;
let currentLang = 'fr';
let authMode = 'login';
let selectedFile = null;
let compressedBlob = null;
let reportTargetId = null;
let storyInterval = null;
let seenStories = JSON.parse(localStorage.getItem('vc_seen_stories') || '[]');
let likedVideos = JSON.parse(localStorage.getItem('vc_liked') || '[]');

// ===== I18N =====
const t = {

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

// ===== INIT =====
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  currentUser = session?.user || null;
  if (currentUser) {
    const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    currentUser.profile = data;
  }
  document.getElementById('app').style.display = 'grid';
  renderStories();
  renderFeed();
  applyLang();
}

// ===== AUTH =====
function requireAuth(cb) {
  if (currentUser) { cb(); return; }
  openAuth();
}
function openAuth() { document.getElementById('auth-modal').classList.remove('hidden'); }
function closeAuth() { document.getElementById('auth-modal').classList.add('hidden'); }

function switchTab(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('auth-username').style.display = mode === 'signup' ? '' : 'none';
  document.getElementById('auth-submit-btn').textContent = mode === 'login' ? T().login_btn : T().signup_btn;
  const switchText = document.getElementById('auth-switch-text');
  const l = T();
  switchText.innerHTML = mode === 'login'
    ? `${l.no_account} <span style="color:var(--volt);cursor:pointer" onclick="switchTab('signup')">${l.register}</span>`
    : `${l.have_account} <span style="color:var(--volt);cursor:pointer" onclick="switchTab('login')">${l.login_link}</span>`;
  document.getElementById('auth-msg').textContent = '';
}

async function submitAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const username = document.getElementById('auth-username').value.trim();
  const btn = document.getElementById('auth-submit-btn');
  const msg = document.getElementById('auth-msg');
  btn.disabled = true;
  msg.textContent = '';

  try {
    if (authMode === 'signup') {
      if (!username) { msg.textContent = currentLang === 'fr' ? 'Pseudo requis' : 'Username required'; btn.disabled=false; return; }
      const { error } = await sb.auth.signUp({ email, password, options: { data: { username } } });
      if (error) throw error;
      msg.style.color = 'var(--volt)';
      msg.textContent = currentLang === 'fr' ? 'Vérifie ton email ✉️' : 'Check your email ✉️';
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      currentUser = data.user;
      const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
      currentUser.profile = profile;
      closeAuth();
      renderStories();
      renderFeed();
    }
  } catch(e) {
    msg.style.color = 'var(--pink)';
    msg.textContent = e.message;
  }
  btn.disabled = false;
}

function handleAvatarClick() {
  if (!currentUser) { openAuth(); return; }
  if (confirm(T().logout + '?')) {
    sb.auth.signOut();
    currentUser = null;
    toast(currentLang === 'fr' ? 'Déconnecté' : 'Logged out');
    renderFeed();
    renderStories();
  }
}

// ===== STORIES =====
async function renderStories() {
  const bar = document.getElementById('stories-bar');
  bar.innerHTML = '';

  // Add story button
  if (currentUser) {
    const addBtn = document.createElement('div');
    addBtn.className = 'add-story-btn';
    addBtn.innerHTML = `<div class="add-story-circle">＋</div><span class="story-label">${T().add_story}</span>`;
    addBtn.onclick = () => { document.getElementById('is-story').checked = true; openUpload(); };
    bar.appendChild(addBtn);
  }

  const { data: stories } = await sb.from('stories')
    .select('*, profiles(username)')
    .gt('expires_at', new Date().toISOString())
    .order('created_at', { ascending: false });

  if (!stories) return;

  // Group by user
  const grouped = {};
  stories.forEach(s => {
    if (!grouped[s.user_id]) grouped[s.user_id] = [];
    grouped[s.user_id].push(s);
  });

  Object.entries(grouped).forEach(([uid, userStories]) => {
    const s = userStories[0];
    const seen = seenStories.includes(s.id);
    const thumb = document.createElement('div');
    thumb.className = 'story-thumb';
    thumb.innerHTML = `
      <div class="story-ring ${seen ? 'seen' : ''}">
        <div class="story-inner">🎬</div>
      </div>
      <span class="story-label">${s.profiles?.username || '?'}</span>`;
    thumb.onclick = () => playStory(userStories);
    bar.appendChild(thumb);
  });
}

function playStory(stories) {
  let idx = 0;
  const viewer = document.getElementById('story-viewer');
  const vid = document.getElementById('story-video');
  const fill = document.getElementById('story-fill');
  const uname = document.getElementById('story-username');
  viewer.classList.remove('hidden');

  function loadStory(i) {
    if (i >= stories.length) { closeStoryViewer(); return; }
    const s = stories[i];
    vid.src = s.video_url;
    uname.textContent = '@' + (s.profiles?.username || '?');
    fill.style.transition = 'none';
    fill.style.width = '0%';
    vid.play();
    if (!seenStories.includes(s.id)) {
      seenStories.push(s.id);
      localStorage.setItem('vc_seen_stories', JSON.stringify(seenStories));
    }
    vid.onloadedmetadata = () => {
      const dur = Math.min(vid.duration, 20) * 1000;
      requestAnimationFrame(() => {
        fill.style.transition = `width ${dur}ms linear`;
        fill.style.width = '100%';
      });
      clearTimeout(storyInterval);
      storyInterval = setTimeout(() => loadStory(i+1), dur);
    };
  }
  loadStory(idx);
}
function closeStoryViewer() {
  clearTimeout(storyInterval);
  document.getElementById('story-viewer').classList.add('hidden');
  document.getElementById('story-video').pause();
  document.getElementById('story-video').src = '';
}

// ===== FEED =====
async function renderFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';

  const { data: videos } = await sb.from('videos')
    .select('*, profiles(username)')
    .eq('hidden', false)
    .order('created_at', { ascending: false });

  if (!videos || videos.length === 0) {
    feed.innerHTML = `<div class="empty-state"><div class="icon">🎬</div><p>${T().no_videos}</p></div>`;
    return;
  }

  videos.forEach(v => feed.appendChild(buildVideoCard(v)));

  // Auto-play on scroll
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const vid = e.target.querySelector('video');
      if (!vid) return;
      if (e.isIntersecting) vid.play().catch(()=>{});
      else { vid.pause(); vid.currentTime = 0; }
    });
  }, { threshold: 0.7 });
  feed.querySelectorAll('.video-card').forEach(c => observer.observe(c));
}

function buildVideoCard(v) {
  const liked = likedVideos.includes(v.id);
  const card = document.createElement('div');
  card.className = 'video-card';
  card.dataset.id = v.id;
  card.innerHTML = `
    <video src="${v.video_url}" loop playsinline muted preload="none"></video>
    <div class="video-overlay"></div>
    <div class="video-info">
      <div class="video-user"><span class="at">@</span>${v.profiles?.username || '?'}</div>
      <div class="video-title">${escHtml(v.title)}</div>
      ${v.description ? `<div class="video-desc">${escHtml(v.description)}</div>` : ''}
    </div>
    <div class="video-actions">
      <div class="vaction" onclick="toggleLike('${v.id}', this)">
        <button class="vaction-icon ${liked ? 'liked' : ''}">${liked ? '❤️' : '🤍'}</button>
        <span class="like-count">${v.like_count || 0}</span>
      </div>
      <div class="vaction" onclick="openReport('${v.id}')">
        <button class="vaction-icon report-btn">🚩</button>
        <span>Report</span>
      </div>
    </div>
  `;

  // Click to play/pause
  card.querySelector('video').addEventListener('click', function() {
    if (this.paused) this.play(); else this.pause();
  });

  return card;
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ===== LIKES =====
async function toggleLike(videoId, el) {
  if (!currentUser) { toast(T().login_required, 'error'); openAuth(); return; }
  const btn = el.querySelector('button');
  const count = el.querySelector('.like-count');
  const liked = likedVideos.includes(videoId);

  if (liked) {
    await sb.from('likes').delete().eq('user_id', currentUser.id).eq('video_id', videoId);
    likedVideos = likedVideos.filter(id => id !== videoId);
    btn.textContent = '🤍'; btn.classList.remove('liked');
    count.textContent = Math.max(0, parseInt(count.textContent) - 1);
  } else {
    await sb.from('likes').insert({ user_id: currentUser.id, video_id: videoId });
    likedVideos.push(videoId);
    btn.textContent = '❤️'; btn.classList.add('liked');
    count.textContent = parseInt(count.textContent) + 1;
  }
  localStorage.setItem('vc_liked', JSON.stringify(likedVideos));
}

// ===== REPORT =====
function openReport(videoId) {
  if (!currentUser) { toast(T().login_required, 'error'); openAuth(); return; }
  reportTargetId = videoId;
  const modal = document.getElementById('report-modal');
  const reasons = document.getElementById('report-reasons');
  reasons.innerHTML = T().reasons.map(r =>
    `<button class="report-reason" onclick="submitReport('${r}')">${r}</button>`
  ).join('');
  document.getElementById('report-title').textContent = T().report_title;
  document.getElementById('report-cancel-btn').textContent = T().report_cancel;
  modal.classList.remove('hidden');
}
function closeReport() { document.getElementById('report-modal').classList.add('hidden'); reportTargetId = null; }

async function submitReport(reason) {
  closeReport();
  const { error } = await sb.from('reports').insert({ reporter_id: currentUser.id, video_id: reportTargetId, reason });
  if (error) { toast(error.message, 'error'); return; }
  toast(T().report_sent, 'success');
  // Check if hidden now
  const { data } = await sb.from('videos').select('hidden, report_count').eq('id', reportTargetId).single();
  if (data?.hidden) {
    toast(T().report_hidden, 'error');
    document.querySelector(`.video-card[data-id="${reportTargetId}"]`)?.remove();
  }
}

function openUpload() { document.getElementById('upload-panel').classList.remove('hidden'); applyLang(); }

  document.getElementById('upload-panel').classList.add('hidden');

// Drag & drop
const dropZone = document.getElementById('upload-drop');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) processFile(f);
});

function handleFileSelect(e) { const f = e.target.files[0]; if (f) processFile(f); }

async function processFile(file) {
  selectedFile = file;
  compressedBlob = null;
  document.getElementById('upload-submit-btn').disabled = true;
  document.getElementById('upload-progress').classList.add('show');
  setProgress(0);
  setStatus(T().compressing + ' 0%');

  const isStory = document.getElementById('is-story').checked;

  // Story: must be mp4
  if (isStory && !file.type.includes('mp4')) {
    toast(T().story_not_mp4, 'error');
    document.getElementById('upload-progress').classList.remove('show');
    setStatus('');
    return;
  }

  try {
    const { FFmpeg } = FFmpegWASM;
    const { fetchFile, toBlobURL } = FFmpegUtil;
    const ffmpeg = new FFmpeg();

    ffmpeg.on('progress', ({ progress }) => {
      const pct = Math.round(progress * 100);
      setProgress(pct);
      setStatus(`${T().compressing} ${pct}%`);
    });

    const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
    await ffmpeg.load({
      coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
      wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
    });

    await ffmpeg.writeFile('input.mp4', await fetchFile(file));

    // Story: cut to 20s max + compress
    const ffArgs = isStory
      ? ['-i','input.mp4','-t','20','-vcodec','libx264','-crf','30','-acodec','aac','-movflags','+faststart','-y','output.mp4']
      : ['-i','input.mp4','-vcodec','libx264','-crf','28','-acodec','aac','-movflags','+faststart','-y','output.mp4'];

    await ffmpeg.exec(ffArgs);
    const data = await ffmpeg.readFile('output.mp4');
    compressedBlob = new Blob([data.buffer], { type: 'video/mp4' });

    setProgress(100);
    setStatus('✅ ' + (currentLang === 'fr' ? 'Prêt à publier' : 'Ready to publish'));
    document.getElementById('upload-submit-btn').disabled = false;
  } catch(e) {
    console.error(e);
    // FFmpeg failed — use original file
    compressedBlob = file;
    setProgress(100);
    setStatus('⚡ ' + (currentLang === 'fr' ? 'Fichier prêt' : 'File ready'));
    document.getElementById('upload-submit-btn').disabled = false;
  }
}

function setProgress(pct) { document.getElementById('upload-progress-bar').style.width = pct + '%'; }
function setStatus(msg) { document.getElementById('upload-status').textContent = msg; }

async function submitUpload() {
  if (!currentUser || !compressedBlob) return;
  const title = document.getElementById('video-title-input').value.trim();
  if (!title) { toast(currentLang === 'fr' ? 'Titre requis' : 'Title required', 'error'); return; }
  const isStory = document.getElementById('is-story').checked;

  const btn = document.getElementById('upload-submit-btn');
  btn.disabled = true;
  setStatus(T().uploading);

  const bucket = isStory ? 'stories' : 'videos';
  const path = `${currentUser.id}/${Date.now()}.mp4`;

  const { data: uploadData, error: uploadError } = await sb.storage.from(bucket).upload(path, compressedBlob, { contentType: 'video/mp4', upsert: false });
  if (uploadError) { toast(uploadError.message, 'error'); btn.disabled = false; return; }

  const { data: { publicUrl } } = sb.storage.from(bucket).getPublicUrl(path);

  if (isStory) {
    // Check story limit
    const { data: existing } = await sb.from('stories').select('id').eq('user_id', currentUser.id).gt('expires_at', new Date().toISOString());
    if (existing && existing.length >= 3) {
      toast(T().story_limit, 'error');
      btn.disabled = false;
      return;
    }

    // Get duration
    let dur = 20;
    try {
      const tmpVid = document.createElement('video');
      tmpVid.src = URL.createObjectURL(compressedBlob);
      await new Promise(r => { tmpVid.onloadedmetadata = r; tmpVid.onerror = r; });
      dur = Math.min(tmpVid.duration || 20, 20);
    } catch(_) {}

    const { error: storyError } = await sb.from('stories').insert({ user_id: currentUser.id, video_url: publicUrl, duration_seconds: dur });
    if (storyError) { toast(storyError.message, 'error'); btn.disabled = false; return; }
  } else {
    const { error: vidError } = await sb.from('videos').insert({ user_id: currentUser.id, title, video_url: publicUrl });
    if (vidError) { toast(vidError.message, 'error'); btn.disabled = false; return; }
  }

  toast(T().done, 'success');
  closeUpload();
  if (isStory) renderStories(); else renderFeed();
}
