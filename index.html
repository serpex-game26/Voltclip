<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>VoltClip — Partage tes clips</title>
<meta name="description" content="VoltClip — Le réseau de partage de vidéos courtes. Stories, feed TikTok, likes, commentaires.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c27;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f5;
  --muted: rgba(255,255,255,0.38);
  --accent: #7c5cfc;
  --accent2: #fc5c7d;
  --green: #2ecc71;
  --font-mono: 'Space Mono', monospace;
  --font: 'DM Sans', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;z-index:10;background:var(--bg)}
.screen.active{display:flex}

/* ── NAV BAR ── */
#navbar{position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  padding:10px 0 max(10px,env(safe-area-inset-bottom));height:60px}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:4px 14px;position:relative}
.nav-btn .ni{font-size:22px;transition:transform .15s}
.nav-btn .nl{font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:.05em}
.nav-btn.active .nl{color:var(--accent)}
.nav-btn.active .ni{transform:scale(1.12)}
#notifDot{position:absolute;top:2px;right:10px;width:8px;height:8px;
  background:var(--accent2);border-radius:50%;display:none}

/* ── FEED ── */
#feedScreen{padding-bottom:60px}
#storiesWrap{position:absolute;top:0;left:0;right:0;z-index:50;
  background:linear-gradient(rgba(10,10,15,0.9),transparent);padding:10px 0 14px}
#storiesBar{display:flex;gap:10px;padding:0 14px;overflow-x:auto;scrollbar-width:none}
#storiesBar::-webkit-scrollbar{display:none}

.story-avatar-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.story-ring{width:54px;height:54px;border-radius:50%;padding:2px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center}
.story-ring.seen{background:var(--surface2)}
.story-ring img,.story-ring .story-initial{width:48px;height:48px;border-radius:50%;object-fit:cover;
  background:var(--surface2);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:18px;color:var(--text);border:2px solid var(--bg)}
.story-uname{font-size:10px;color:var(--muted);max-width:54px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}

#videoFeed{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
#videoFeed::-webkit-scrollbar{display:none}

.video-item{position:relative;height:calc(100dvh - 60px);scroll-snap-align:start;scroll-snap-stop:always;background:#000;overflow:hidden;flex-shrink:0}
.video-item video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.video-grad{position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(10,10,15,0.92));pointer-events:none}
.video-pause-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:60px;opacity:0;transition:opacity .2s;pointer-events:none}
.video-pause-icon.show{opacity:.8}

.video-info{position:absolute;bottom:18px;left:14px;right:72px}
.video-user{font-family:var(--font-mono);font-size:13px;font-weight:700;color:#fff;margin-bottom:4px;cursor:pointer}
.video-title{font-size:14px;font-weight:500;color:rgba(255,255,255,.9);margin-bottom:4px;line-height:1.4}
.video-tags{display:flex;flex-wrap:wrap;gap:4px}
.video-tag{font-size:11px;color:var(--accent);cursor:pointer}

.video-actions{position:absolute;bottom:18px;right:10px;display:flex;flex-direction:column;gap:18px;align-items:center}
.vbtn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.vbtn .vi{font-size:26px;filter:drop-shadow(0 1px 4px rgba(0,0,0,.5))}
.vbtn .vc{font-size:11px;font-weight:700;color:#fff;font-family:var(--font-mono);text-shadow:0 1px 3px rgba(0,0,0,.8)}
.vbtn.liked .vi{animation:likePop .3s ease}
@keyframes likePop{0%{transform:scale(1)}50%{transform:scale(1.35)}100%{transform:scale(1)}}

.video-progress{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.15)}
.video-progress-fill{height:100%;background:rgba(255,255,255,.6);transition:width .1s linear}

/* ── STORY VIEWER ── */
#storyViewer{position:fixed;inset:0;z-index:500;background:#000;display:none;flex-direction:column}
#storyViewer.open{display:flex}
#storyProgressBar{height:3px;background:rgba(255,255,255,.25);position:relative}
#storyProgressFill{position:absolute;top:0;left:0;height:100%;background:#fff;transition:width .1s linear}
#storyHeader{position:absolute;top:10px;left:12px;right:12px;z-index:10;display:flex;align-items:center;gap:10px}
#storyVideo{width:100%;height:100%;object-fit:cover}
#storyUser{color:#fff;font-weight:700;font-size:14px;flex:1}
#storyClose{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px}

/* ── SEARCH ── */
#searchScreen{padding-bottom:60px;overflow-y:auto}
.search-header{padding:14px 14px 10px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)}
.search-bar{display:flex;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
.search-bar input{background:none;border:none;color:var(--text);font-family:var(--font);font-size:15px;flex:1;outline:none}
.search-bar input::placeholder{color:var(--muted)}
#searchResults{padding:14px}
.search-section-title{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:.1em;margin-bottom:10px;margin-top:16px}
.hashtag-chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 12px;margin:4px;cursor:pointer;font-size:13px;color:var(--text);transition:border-color .15s}
.hashtag-chip:active{border-color:var(--accent)}
.search-video-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px}
.search-thumb{aspect-ratio:9/16;background:var(--surface);overflow:hidden;cursor:pointer;position:relative}
.search-thumb img{width:100%;height:100%;object-fit:cover}
.search-thumb-views{position:absolute;bottom:4px;left:4px;font-size:10px;font-weight:700;color:#fff;font-family:var(--font-mono);text-shadow:0 1px 3px rgba(0,0,0,.8)}

/* ── CLASSEMENT ── */
#rankScreen{padding-bottom:60px;overflow-y:auto}
.rank-header{padding:16px 14px 10px;background:var(--bg);position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border)}
.rank-title{font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--text);margin-bottom:10px}
.period-tabs{display:flex;gap:6px}
.period-tab{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-family:var(--font-mono);color:var(--muted);cursor:pointer;transition:.15s}
.period-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
#rankList{padding:10px 14px}
.rank-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.rank-num{font-family:var(--font-mono);font-size:18px;font-weight:700;width:28px;text-align:center}
.rank-num.gold{color:#ffd700}
.rank-num.silver{color:#c0c0c0}
.rank-num.bronze{color:#cd7f32}
.rank-thumb{width:52px;height:72px;border-radius:8px;object-fit:cover;background:var(--surface);flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-video-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-username{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--font-mono)}
.rank-score{font-family:var(--font-mono);font-size:11px;color:var(--accent);margin-top:4px}

/* ── NOTIFICATIONS ── */
#notifScreen{padding-bottom:60px;overflow-y:auto}
.notif-header{padding:16px 14px;font-family:var(--font-mono);font-size:18px;font-weight:700;border-bottom:1px solid var(--border)}
.notif-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.notif-item.unread{background:rgba(124,92,252,.05)}
.notif-avatar{width:40px;height:40px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.notif-text{flex:1;font-size:13px;color:var(--text);line-height:1.4}
.notif-text span{font-weight:700;color:var(--accent)}
.notif-time{font-size:10px;color:var(--muted);font-family:var(--font-mono);flex-shrink:0}
.notif-icon{font-size:18px}
.notif-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}

/* ── PROFIL ── */
#profileScreen{padding-bottom:60px;overflow-y:auto}
.profile-top{padding:20px 14px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;position:relative;cursor:pointer}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-avatar-edit{position:absolute;bottom:0;right:0;background:var(--accent);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px}
.profile-username{font-family:var(--font-mono);font-size:17px;font-weight:700}
.profile-bio{font-size:13px;color:var(--muted);text-align:center;max-width:280px;line-height:1.5}
.profile-stats{display:flex;gap:24px}
.pstat{display:flex;flex-direction:column;align-items:center;gap:1px}
.pstat-val{font-family:var(--font-mono);font-size:17px;font-weight:700;color:var(--text)}
.pstat-lbl{font-size:10px;color:var(--muted);letter-spacing:.06em}
.profile-actions{display:flex;gap:8px;width:100%;max-width:300px}
.profile-btn{flex:1;padding:9px;border-radius:10px;font-family:var(--font-mono);font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.15s}
.profile-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.profile-videos-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;padding:2px}
.profile-thumb{aspect-ratio:9/16;background:var(--surface);overflow:hidden;cursor:pointer;position:relative}
.profile-thumb img{width:100%;height:100%;object-fit:cover}
.profile-thumb-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);border:none;color:#fff;width:22px;height:22px;border-radius:50%;font-size:12px;cursor:pointer;display:none}
.profile-thumb:hover .profile-thumb-del{display:flex;align-items:center;justify-content:center}

/* ── AUTH ── */
#authModal{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.7);display:none;align-items:flex-end}
#authModal.open{display:flex}
.auth-box{background:var(--surface);border-radius:20px 20px 0 0;width:100%;padding:24px 20px 36px;display:flex;flex-direction:column;gap:14px}
.auth-title{font-family:var(--font-mono);font-size:18px;font-weight:700;text-align:center}
.auth-input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--font);font-size:15px;width:100%;outline:none;transition:border-color .2s}
.auth-input:focus{border-color:var(--accent)}
.auth-input::placeholder{color:var(--muted)}
.auth-btn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-family:var(--font-mono);font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.auth-btn:active{opacity:.8}
.auth-switch{text-align:center;font-size:13px;color:var(--muted);cursor:pointer}
.auth-switch span{color:var(--accent);font-weight:700}
.auth-err{color:var(--accent2);font-size:12px;text-align:center}
.auth-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;align-self:flex-end;margin-bottom:-6px}

/* ── UPLOAD ── */
#uploadModal{position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.7);display:none;align-items:flex-end}
#uploadModal.open{display:flex}
.upload-box{background:var(--surface);border-radius:20px 20px 0 0;width:100%;padding:20px 18px 36px;display:flex;flex-direction:column;gap:12px;max-height:90vh;overflow-y:auto}
.upload-title{font-family:var(--font-mono);font-size:16px;font-weight:700}
.upload-type-row{display:flex;gap:8px}
.upload-type-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:var(--font-mono);font-size:12px;cursor:pointer;text-align:center;transition:.15s}
.upload-type-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(124,92,252,.08)}
.upload-input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-family:var(--font);font-size:14px;width:100%;outline:none}
.upload-input:focus{border-color:var(--accent)}
.upload-input::placeholder{color:var(--muted)}
.upload-file-btn{width:100%;padding:13px;border:2px dashed var(--border);border-radius:12px;background:none;color:var(--muted);font-family:var(--font-mono);font-size:13px;cursor:pointer;transition:.15s}
.upload-file-btn:active{border-color:var(--accent);color:var(--accent)}
.upload-submit{width:100%;padding:13px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-family:var(--font-mono);font-size:14px;font-weight:700;cursor:pointer}
.upload-cancel{width:100%;padding:11px;border:1px solid var(--border);border-radius:12px;background:none;color:var(--muted);font-family:var(--font-mono);font-size:13px;cursor:pointer}
.upload-progress{text-align:center;color:var(--muted);font-size:13px;font-family:var(--font-mono);padding:10px 0}
.upload-err{color:var(--accent2);font-size:12px;text-align:center}

/* ── COMMENTS ── */
#commentsModal{position:fixed;inset:0;z-index:800;display:none;flex-direction:column;justify-content:flex-end}
#commentsModal.open{display:flex}
#commentsBg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.comments-box{position:relative;background:var(--surface);border-radius:20px 20px 0 0;max-height:75vh;display:flex;flex-direction:column}
.comments-header{padding:14px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.comments-title{font-family:var(--font-mono);font-size:14px;font-weight:700}
.comments-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
#commentsList{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:12px;max-height:50vh}
.comment-item{display:flex;gap:10px}
.comment-avatar{width:32px;height:32px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.comment-body{flex:1}
.comment-user{font-family:var(--font-mono);font-size:11px;color:var(--accent);font-weight:700}
.comment-text{font-size:13px;color:var(--text);margin-top:2px;line-height:1.4}
.comment-time{font-size:10px;color:var(--muted);margin-top:3px;font-family:var(--font-mono)}
.comment-input-row{padding:10px 14px max(14px,env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;gap:8px}
.comment-input-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:10px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none}
.comment-send{background:var(--accent);border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:16px;flex-shrink:0}

/* ── TOAST ── */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:9999;
  background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 18px;
  font-family:var(--font-mono);font-size:12px;color:var(--text);white-space:nowrap;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── MISC ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;gap:10px;color:var(--muted);text-align:center}
.empty-state .ei{font-size:40px;margin-bottom:4px}
.empty-state p{font-size:14px;line-height:1.5}
.loader-dots{display:flex;gap:6px;align-items:center;justify-content:center;padding:30px}
.loader-dots span{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:ldot .9s ease-in-out infinite}
.loader-dots span:nth-child(2){animation-delay:.15s}
.loader-dots span:nth-child(3){animation-delay:.3s}
@keyframes ldot{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* ── FAB UPLOAD ── */
#fabUpload{position:fixed;bottom:70px;right:16px;z-index:150;
  width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:24px;box-shadow:0 4px 20px rgba(124,92,252,.5);
  display:flex;align-items:center;justify-content:center;transition:transform .15s}
#fabUpload:active{transform:scale(.92)}
</style>
</head>
<body>

<!-- ═══ TOAST ═══ -->
<div id="toast"></div>

<!-- ═══ NAV ═══ -->
<nav id="navbar">
  <button class="nav-btn active" onclick="showTab('feed')" id="nav-feed">
    <span class="ni">🏠</span><span class="nl">FEED</span>
  </button>
  <button class="nav-btn" onclick="showTab('search')" id="nav-search">
    <span class="ni">🔍</span><span class="nl">SEARCH</span>
  </button>
  <button class="nav-btn" onclick="showTab('rank')" id="nav-rank">
    <span class="ni">🏆</span><span class="nl">TOP</span>
  </button>
  <button class="nav-btn" onclick="showTab('notif')" id="nav-notif">
    <span class="ni">🔔</span><span class="nl">NOTIFS</span>
    <div id="notifDot"></div>
  </button>
  <button class="nav-btn" onclick="showTab('profile')" id="nav-profile">
    <span class="ni">👤</span><span class="nl">PROFIL</span>
  </button>
</nav>

<!-- ═══ FAB UPLOAD ═══ -->
<button id="fabUpload" onclick="openUpload()">＋</button>

<!-- ═══ FEED SCREEN ═══ -->
<div id="feedScreen" class="screen active">
  <div id="storiesWrap">
    <div id="storiesBar"></div>
  </div>
  <div id="videoFeed"></div>
</div>

<!-- ═══ SEARCH SCREEN ═══ -->
<div id="searchScreen" class="screen">
  <div class="search-header">
    <div class="search-bar">
      <span>🔍</span>
      <input id="searchInput" type="text" placeholder="Rechercher vidéos, hashtags…" oninput="onSearch(this.value)">
    </div>
  </div>
  <div id="searchResults">
    <div class="search-section-title">TENDANCES</div>
    <div id="trendingTags"></div>
    <div class="search-section-title" style="margin-top:20px">RÉCENTES</div>
    <div id="recentGrid" class="search-video-grid"></div>
  </div>
</div>

<!-- ═══ RANK SCREEN ═══ -->
<div id="rankScreen" class="screen">
  <div class="rank-header">
    <div class="rank-title">🏆 CLASSEMENT</div>
    <div class="period-tabs">
      <button class="period-tab active" onclick="loadRank('week',this)">SEMAINE</button>
      <button class="period-tab" onclick="loadRank('month',this)">MOIS</button>
      <button class="period-tab" onclick="loadRank('all',this)">TOUT</button>
    </div>
  </div>
  <div id="rankList"><div class="loader-dots"><span></span><span></span><span></span></div></div>
</div>

<!-- ═══ NOTIF SCREEN ═══ -->
<div id="notifScreen" class="screen">
  <div class="notif-header">🔔 NOTIFICATIONS</div>
  <div id="notifList"></div>
</div>

<!-- ═══ PROFILE SCREEN ═══ -->
<div id="profileScreen" class="screen">
  <div class="profile-top">
    <div class="profile-avatar" id="profileAvatarWrap" onclick="changeAvatar()">
      <span id="profileAvatarInitial">👤</span>
      <div class="profile-avatar-edit">✏️</div>
    </div>
    <div class="profile-username" id="profileUsername">—</div>

<script>
// ══════════════════════════════════════════
// CONFIG — remplace par tes clés Supabase
// ══════════════════════════════════════════
const SUPABASE_URL  = 'https://czdfoqucjbsoupekpxpg.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6ZGZvcWdjamJzb3VwZWtweHBnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzQ3MzgsImV4cCI6MjA4OTAxMDczOH0.ANivcmm64cYQCZZiFrCpduigWytloZSzwJ1vi1BbOy0'
const COMPRESS_URL  = 'https://voltclip-server.onrender.com' // ex: https://voltclip-compress.onrender.com

const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON)

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let currentUser = null
let currentTab  = 'feed'
let uploadType  = 'video'
let uploadFile  = null
let activeVideoEl = null
let commentsVideoId = null
let storyInterval = null

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init() {
  const { data: { session } } = await sb.auth.getSession()
  currentUser = session?.user ?? null

  sb.auth.onAuthStateChange((_, session) => {
    currentUser = session?.user ?? null
    refreshProfile()
    if (currentTab === 'notif') loadNotifs()
  })

  loadFeed()
  loadStories()
  loadSearch()
  loadRank('week')
  refreshProfile()

  // Realtime notifs
  sb.channel('notifications')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications',
      filter: currentUser ? `user_id=eq.${currentUser.id}` : undefined
    }, () => { document.getElementById('notifDot').style.display = 'block' })
    .subscribe()
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function showTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'))
  document.getElementById(tab + 'Screen').classList.add('active')
  document.getElementById('nav-' + tab).classList.add('active')
  currentTab = tab
  if (tab === 'feed') { if (activeVideoEl) activeVideoEl.play().catch(()=>{}) }
  else { if (activeVideoEl) activeVideoEl.pause() }
  if (tab === 'notif') { loadNotifs(); document.getElementById('notifDot').style.display = 'none' }
  if (tab === 'search') loadSearch()
  if (tab === 'profile') refreshProfile()
}

// ══════════════════════════════════════════
// FEED
// ══════════════════════════════════════════
async function loadFeed() {
  const feed = document.getElementById('videoFeed')
  feed.innerHTML = '<div class="loader-dots" style="margin-top:45vh"><span></span><span></span><span></span></div>'

  const { data: videos, error } = await sb
    .from('videos')
    .select('*, profiles(username, avatar_url)')
    .eq('status', 'active')
    .order('created_at', { ascending: false })
    .limit(30)

  if (error || !videos?.length) {
    feed.innerHTML = '<div class="empty-state" style="height:100dvh"><span class="ei">🎬</span><p>Aucune vidéo pour l\'instant.<br>Sois le premier à publier !</p></div>'
    return
  }

  // Get liked videos
  let likedIds = new Set()
  if (currentUser) {
    const { data: likes } = await sb.from('likes').select('video_id').eq('user_id', currentUser.id)
    likedIds = new Set(likes?.map(l => l.video_id))
  }

  feed.innerHTML = ''
  videos.forEach((v, i) => {
    const el = createVideoItem(v, i, likedIds.has(v.id))
    feed.appendChild(el)
  })

  // Intersection observer for autoplay
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      const vid = e.target.querySelector('video')
      if (e.isIntersecting) {
        if (activeVideoEl && activeVideoEl !== vid) { activeVideoEl.pause(); activeVideoEl.currentTime = 0 }
        activeVideoEl = vid
        if (currentTab === 'feed') vid.play().catch(()=>{})
        // Increment views
        const vidId = e.target.dataset.videoId
        if (vidId) sb.rpc('increment_views', { vid_id: vidId })
      } else {
        vid.pause()
      }
    })
  }, { threshold: 0.6 })

  feed.querySelectorAll('.video-item').forEach(el => observer.observe(el))
}

function createVideoItem(v, i, liked) {
  const div = document.createElement('div')
  div.className = 'video-item'
  div.dataset.videoId = v.id
  div.dataset.index = i

  // Extract hashtags from description
  const tags = (v.description || '').match(/#\w+/g) || []
  const tagsHtml = tags.map(t => `<span class="video-tag" onclick="searchByTag('${t.slice(1)}')">${t}</span>`).join('')

  div.innerHTML = `
    <video src="${v.video_url}" poster="${v.thumbnail_url||''}" loop playsinline preload="metadata"></video>
    <div class="video-grad"></div>
    <div class="video-pause-icon" id="pause-${v.id}">⏸</div>
    <div class="video-info">
      <div class="video-user" onclick="openUserProfile('${v.user_id}')">@${v.profiles?.username||'user'}</div>
      <div class="video-title">${escHtml(v.title)}</div>
      <div class="video-tags">${tagsHtml}</div>
    </div>
    <div class="video-actions">
      <button class="vbtn ${liked?'liked':''}" id="like-${v.id}" onclick="toggleLike('${v.id}',${liked})">
        <span class="vi">${liked?'❤️':'🤍'}</span>
        <span class="vc" id="lc-${v.id}">${fmtNum(v.likes_count)}</span>
      </button>
      <button class="vbtn" onclick="openComments('${v.id}',${v.comments_count})">
        <span class="vi">💬</span>
        <span class="vc" id="cc-${v.id}">${fmtNum(v.comments_count)}</span>
      </button>
      <button class="vbtn" onclick="shareVideo('${v.id}')">
        <span class="vi">🔗</span>
        <span class="vc">SHARE</span>
      </button>
    </div>
    <div class="video-progress"><div class="video-progress-fill" id="prog-${v.id}"></div></div>
  `

  // Click to pause/play
  div.querySelector('video').addEventListener('click', function() {
    if (this.paused) { this.play(); document.getElementById('pause-'+v.id).classList.remove('show') }
    else { this.pause(); document.getElementById('pause-'+v.id).classList.add('show') }
  })

  // Progress bar
  div.querySelector('video').addEventListener('timeupdate', function() {
    const p = document.getElementById('prog-'+v.id)
    if (p && this.duration) p.style.width = (this.currentTime/this.duration*100)+'%'
  })

  return div
}

// ══════════════════════════════════════════
// LIKE
// ══════════════════════════════════════════
async function toggleLike(videoId, isLiked) {
  if (!currentUser) { openAuth(); return }

  const btn = document.getElementById('like-'+videoId)
  const cnt = document.getElementById('lc-'+videoId)
  const newLiked = !isLiked
  const cur = parseInt(cnt.textContent.replace(/[KM]/,'')) || 0

  btn.querySelector('.vi').textContent = newLiked ? '❤️' : '🤍'
  if (newLiked) btn.classList.add('liked'); else btn.classList.remove('liked')

  // Update onclick
  btn.setAttribute('onclick', `toggleLike('${videoId}',${newLiked})`)

  if (newLiked) {
    await sb.from('likes').insert({ user_id: currentUser.id, video_id: videoId })
  } else {
    await sb.from('likes').delete().eq('user_id', currentUser.id).eq('video_id', videoId)
  }
}

// ══════════════════════════════════════════
// SHARE
// ══════════════════════════════════════════
function shareVideo(videoId) {
  const url = window.location.origin + window.location.pathname + '?v=' + videoId
  if (navigator.share) {
    navigator.share({ title: 'VoltClip', url })
  } else {
    navigator.clipboard.writeText(url).then(() => toast('Lien copié ! 🔗'))
  }
}

// ══════════════════════════════════════════
// STORIES
// ══════════════════════════════════════════
async function loadStories() {
  const { data } = await sb.from('stories')
    .select('*, profiles(username)')
    .gt('expires_at', new Date().toISOString())
    .order('created_at', { ascending: false })
    .limit(15)

  const bar = document.getElementById('storiesBar')
  if (!data?.length) { document.getElementById('storiesWrap').style.display = 'none'; return }
  document.getElementById('storiesWrap').style.display = 'block'

  bar.innerHTML = data.map(s => `
    <div class="story-avatar-wrap" onclick="openStory('${s.video_url}','${s.profiles?.username||''}')">
      <div class="story-ring">
        ${s.thumbnail_url
          ? `<img src="${s.thumbnail_url}" alt="">`
          : `<div class="story-initial">${(s.profiles?.username||'?')[0].toUpperCase()}</div>`
        }
      </div>
      <span class="story-uname">${s.profiles?.username||'user'}</span>
    </div>
  `).join('')
}

function openStory(url, username) {
  const v = document.getElementById('storyVideo')
  v.src = url
  v.play().catch(()=>{})
  document.getElementById('storyUserSpan').textContent = '@' + username
  document.getElementById('storyViewer').classList.add('open')
  let pct = 0
  storyInterval = setInterval(() => {
    pct += 1
    document.getElementById('storyProgressFill').style.width = pct + '%'
    if (pct >= 100) closeStory()
  }, 100)
}

function closeStory() {
  clearInterval(storyInterval)
  document.getElementById('storyViewer').classList.remove('open')
  document.getElementById('storyVideo').pause()
  document.getElementById('storyProgressFill').style.width = '0'
}

// ══════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════
let searchTimeout = null
async function loadSearch() {
  // Trending hashtags
  const { data: tags } = await sb.from('hashtags').select('name,videos_count').order('videos_count', { ascending: false }).limit(12)
  const tagWrap = document.getElementById('trendingTags')
  tagWrap.innerHTML = (tags||[]).map(t => `<button class="hashtag-chip" onclick="searchByTag('${t.name}')">#${t.name} <span style="color:var(--muted);font-size:10px">${t.videos_count}</span></button>`).join('')

  // Recent videos grid
  const { data: recent } = await sb.from('videos').select('id,thumbnail_url,views_count').eq('status','active').order('created_at',{ascending:false}).limit(18)
  const grid = document.getElementById('recentGrid')
  grid.innerHTML = (recent||[]).map(v => `
    <div class="search-thumb" onclick="playFromSearch('${v.id}')">
      <img src="${v.thumbnail_url||''}" loading="lazy" alt="">
      <span class="search-thumb-views">👁 ${fmtNum(v.views_count)}</span>
    </div>
  `).join('')
}

function onSearch(q) {
  clearTimeout(searchTimeout)
  if (!q.trim()) { loadSearch(); return }
  searchTimeout = setTimeout(() => doSearch(q.trim()), 400)
}

async function doSearch(q) {
  const { data } = await sb.rpc('search_videos', { query: q })
  const res = document.getElementById('searchResults')
  if (!data?.length) {
    res.innerHTML = '<div class="empty-state"><span class="ei">🔍</span><p>Aucun résultat pour "'+escHtml(q)+'"</p></div>'
    return
  }
  res.innerHTML = `
    <div class="search-section-title">RÉSULTATS (${data.length})</div>
    <div class="search-video-grid">
      ${data.map(v => `
        <div class="search-thumb" onclick="playFromSearch('${v.id}')">
          <img src="${v.thumbnail_url||''}" loading="lazy" alt="">
          <span class="search-thumb-views">👁 ${fmtNum(v.views_count)}</span>
        </div>
      `).join('')}
    </div>
  `
}

function searchByTag(tag) {
  document.getElementById('searchInput').value = '#' + tag
  showTab('search')
  doSearch(tag)
}

async function playFromSearch(videoId) {
  // Switch to feed and scroll to video
  showTab('feed')
  const existing = document.querySelector(`[data-video-id="${videoId}"]`)
  if (existing) { existing.scrollIntoView({ behavior: 'smooth' }); return }
  // Load specific video if not in feed
  const { data: v } = await sb.from('videos').select('*, profiles(username)').eq('id', videoId).single()
  if (v) {
    const feed = document.getElementById('videoFeed')
    const el = createVideoItem(v, 0, false)
    feed.prepend(el)
    el.scrollIntoView()
  }
}

// ══════════════════════════════════════════
// CLASSEMENT
// ══════════════════════════════════════════
async function loadRank(period, tabEl) {
  if (tabEl) {
    document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'))
    tabEl.classList.add('active')
  }

  const list = document.getElementById('rankList')
  list.innerHTML = '<div class="loader-dots"><span></span><span></span><span></span></div>'

  const { data } = await sb.rpc('get_top_videos', { period })
  if (!data?.length) {
    list.innerHTML = '<div class="empty-state"><span class="ei">🏆</span><p>Pas encore de classement</p></div>'
    return
  }

  list.innerHTML = data.map((v, i) => {
    const numClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : ''
    return `
      <div class="rank-item" onclick="playFromSearch('${v.id}')">
        <span class="rank-num ${numClass}">${i < 3 ? ['🥇','🥈','🥉'][i] : i+1}</span>
        <img class="rank-thumb" src="${v.thumbnail_url||''}" alt="">
        <div class="rank-info">
          <div class="rank-video-title">${escHtml(v.title)}</div>
          <div class="rank-username">@${v.username}</div>
          <div class="rank-score">❤️ ${fmtNum(v.likes_count)} · 👁 ${fmtNum(v.views_count)} · 💬 ${fmtNum(v.comments_count)}</div>
        </div>
      </div>
    `
  }).join('')
}

// ══════════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════════
async function loadNotifs() {
  if (!currentUser) {
    document.getElementById('notifList').innerHTML = '<div class="empty-state"><span class="ei">🔔</span><p>Connecte-toi pour voir tes notifications</p></div>'
    return
  }

  const { data } = await sb.from('notifications')
    .select('*, actor:actor_id(username)')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false })
    .limit(30)

  // Mark all as read
  await sb.from('notifications').update({ is_read: true }).eq('user_id', currentUser.id)

  const list = document.getElementById('notifList')
  if (!data?.length) {
    list.innerHTML = '<div class="empty-state"><span class="ei">🔔</span><p>Aucune notification pour l\'instant</p></div>'
    return
  }

  const typeIcon = { like: '❤️', comment: '💬', follow: '👤', mention: '@' }
  const typeText = { like: 'a aimé ta vidéo', comment: 'a commenté ta vidéo', follow: 'a commencé à te suivre', mention: 't\'a mentionné' }

  list.innerHTML = data.map(n => `
    <div class="notif-item ${n.is_read?'':'unread'}">
      <div class="notif-avatar">${typeIcon[n.type]||'🔔'}</div>
      <div class="notif-text"><span>@${n.actor?.username||'?'}</span> ${typeText[n.type]||''}</div>
      <div class="notif-time">${timeAgo(n.created_at)}</div>
    </div>
  `).join('')
}

// ══════════════════════════════════════════
// PROFIL
// ══════════════════════════════════════════
async function refreshProfile() {
  const notLogged = document.getElementById('profileNotLoggedIn')
  const grid = document.getElementById('profileGrid')

  if (!currentUser) {
    notLogged.style.display = 'block'
    grid.style.display = 'none'
    return
  }
  notLogged.style.display = 'none'
  grid.style.display = 'grid'

  const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single()
  if (!profile) return

  document.getElementById('profileUsername').textContent = '@' + profile.username
  document.getElementById('profileBio').textContent = profile.bio || 'Aucune bio'
  document.getElementById('pVideos').textContent = fmtNum(profile.videos_count)
  document.getElementById('pFollowers').textContent = fmtNum(profile.followers_count)
  document.getElementById('pFollowing').textContent = fmtNum(profile.following_count)

  if (profile.avatar_url) {
    document.getElementById('profileAvatarWrap').innerHTML = `<img src="${profile.avatar_url}" alt=""><div class="profile-avatar-edit">✏️</div>`
  } else {
    document.getElementById('profileAvatarInitial').textContent = profile.username[0].toUpperCase()
  }

  // Load user videos
  const { data: videos } = await sb.from('videos').select('id,thumbnail_url,views_count').eq('user_id', currentUser.id).eq('status','active').order('created_at',{ascending:false})
  grid.innerHTML = (videos||[]).map(v => `
    <div class="profile-thumb">
      <img src="${v.thumbnail_url||''}" loading="lazy" alt="">
      <button class="profile-thumb-del" onclick="deleteVideo('${v.id}',event)">✕</button>
    </div>
  `).join('')
}

async function deleteVideo(videoId, e) {
  e.stopPropagation()
  if (!confirm('Supprimer cette vidéo ?')) return
  await sb.from('videos').delete().eq('id', videoId)
  toast('Vidéo supprimée')
  refreshProfile()
  loadFeed()
}

async function editProfile() {
  const bio = prompt('Ta bio (max 100 caractères) :')
  if (bio === null) return
  await sb.from('profiles').update({ bio: bio.slice(0,100) }).eq('id', currentUser.id)
  toast('Profil mis à jour ✓')
  refreshProfile()
}

async function changeAvatar() {
  if (!currentUser) { openAuth(); return }
  const input = document.createElement('input')
  input.type = 'file'; input.accept = 'image/*'
  input.onchange = async () => {
    const file = input.files[0]
    if (!file) return
    const path = `${currentUser.id}/avatar.jpg`
    const { error } = await sb.storage.from('avatars').upload(path, file, { upsert: true })
    if (error) { toast('Erreur upload avatar'); return }
    const { data: { publicUrl } } = sb.storage.from('avatars').getPublicUrl(path)
    await sb.from('profiles').update({ avatar_url: publicUrl }).eq('id', currentUser.id)
    toast('Avatar mis à jour ✓')
    refreshProfile()
  }
  input.click()
}

async function openUserProfile(userId) {
  const { data: p } = await sb.from('profiles').select('*').eq('id', userId).single()
  if (!p) return
  const isSelf = currentUser?.id === userId
  let isFollowing = false
  if (currentUser && !isSelf) {
    const { data } = await sb.from('follows').select('*').eq('follower_id', currentUser.id).eq('following_id', userId).single()
    isFollowing = !!data
  }
  // Simple alert-based profile view (could be a full modal)
  const action = isSelf ? '' : isFollowing ? '\n[Déjà abonné — cliquer pour se désabonner]' : '\n[Cliquer pour s\'abonner]'
  const confirm_ = confirm(`@${p.username}\n${p.bio||''}\n📹 ${p.videos_count} vidéos · 👥 ${p.followers_count} abonnés${action}`)
  if (confirm_ && !isSelf) toggleFollow(userId, isFollowing)
}

async function toggleFollow(userId, isFollowing) {
  if (!currentUser) { openAuth(); return }
  if (isFollowing) {
    await sb.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', userId)
    toast('Désabonné')
  } else {
    await sb.from('follows').insert({ follower_id: currentUser.id, following_id: userId })
    toast('Abonné !')
  }
}

async function signOut() {
  await sb.auth.signOut()
  currentUser = null
  toast('Déconnecté')
  refreshProfile()
}

// ══════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════
let authMode = 'login'
function openAuth() { document.getElementById('authModal').classList.add('open') }
function closeAuth() { document.getElementById('authModal').classList.remove('open') }

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'signup' : 'login'
  const isSignup = authMode === 'signup'
  document.getElementById('authTitle').textContent = isSignup ? 'Inscription' : 'Connexion'
  document.getElementById('authUsername').style.display = isSignup ? 'block' : 'none'
  document.getElementById('authSwitch').innerHTML = isSignup
    ? 'Déjà un compte ? <span>Se connecter</span>'
    : 'Pas de compte ? <span>S\'inscrire</span>'
  document.getElementById('authErr').textContent = ''
}

async function submitAuth() {
  const email = document.getElementById('authEmail').value.trim()
  const password = document.getElementById('authPassword').value
  const username = document.getElementById('authUsername').value.trim()
  const errEl = document.getElementById('authErr')
  errEl.textContent = ''

  if (!email || !password) { errEl.textContent = 'Remplis tous les champs'; return }

  if (authMode === 'signup') {
    if (!username) { errEl.textContent = 'Choisis un pseudo'; return }
    const { error } = await sb.auth.signUp({ email, password, options: { data: { username } } })
    if (error) { errEl.textContent = error.message; return }
    toast('Compte créé ! Vérifie ton email ✉️')
  } else {
    const { error } = await sb.auth.signInWithPassword({ email, password })
    if (error) { errEl.textContent = 'Email ou mot de passe incorrect'; return }
    toast('Connecté !')
  }
  closeAuth()
}

// ══════════════════════════════════════════
// UPLOAD
// ══════════════════════════════════════════
function openUpload() {
  if (!currentUser) { openAuth(); return }
  document.getElementById('uploadModal').classList.add('open')
  document.getElementById('uploadErr').textContent = ''
  document.getElementById('uploadProgress').style.display = 'none'
  document.getElementById('uploadSubmit').style.display = 'none'
  uploadFile = null
}
function closeUpload() { document.getElementById('uploadModal').classList.remove('open') }

function setUploadType(type) {
  uploadType = type
  document.getElementById('typeVideo').classList.toggle('active', type === 'video')
  document.getElementById('typeStory').classList.toggle('active', type === 'story')
  document.getElementById('uploadVideoFields').style.display = type === 'video' ? 'flex' : 'none'
  document.getElementById('uploadVideoFields').style.flexDirection = 'column'
  document.getElementById('uploadVideoFields').style.gap = '0'
}

function handleFileSelect(input) {
  const file = input.files[0]
  if (!file) return
  if (!file.type.startsWith('video/')) { document.getElementById('uploadErr').textContent = 'Fichier vidéo uniquement'; return }
  if (file.size > 200 * 1024 * 1024) { document.getElementById('uploadErr').textContent = 'Fichier trop lourd (max 200MB)'; return }
  uploadFile = file
  document.getElementById('uploadSubmit').style.display = 'block'
  document.getElementById('uploadErr').textContent = ''
  toast('Vidéo sélectionnée ✓')
}

async function submitUpload() {
  if (!uploadFile) { document.getElementById('uploadErr').textContent = 'Sélectionne une vidéo'; return }
  const title = document.getElementById('uploadTitle').value.trim()
  if (uploadType === 'video' && !title) { document.getElementById('uploadErr').textContent = 'Titre obligatoire'; return }

  const prog = document.getElementById('uploadProgress')
  prog.style.display = 'block'
  prog.textContent = '⏳ Compression en cours…'
  document.getElementById('uploadSubmit').style.display = 'none'
  document.getElementById('uploadErr').textContent = ''

  const { data: { session } } = await sb.auth.getSession()
  if (!session) { document.getElementById('uploadErr').textContent = 'Non connecté'; return }

  try {
    const formData = new FormData()
    formData.append('video', uploadFile)
    const endpoint = uploadType === 'story' ? '/compress/story' : '/compress/video'
    const res = await fetch(COMPRESS_URL + endpoint, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + session.access_token },
      body: formData
    })
    const result = await res.json()
    if (!res.ok) throw new Error(result.error || 'Erreur serveur')

    prog.textContent = '💾 Enregistrement…'

    const desc = document.getElementById('uploadDesc').value.trim()
    const tagsRaw = document.getElementById('uploadTags').value
    const tags = (tagsRaw.match(/#\w+/g)||[]).map(t => t.slice(1).toLowerCase())

    if (uploadType === 'video') {
      const { data: vid, error } = await sb.from('videos').insert({
        user_id: currentUser.id,
        title: title || 'Sans titre',
        description: desc + (tags.length ? ' ' + tags.map(t=>'#'+t).join(' ') : ''),
        video_url: result.videoUrl,
        thumbnail_url: result.thumbUrl,
        duration: result.duration || 0
      }).select().single()

      if (error) throw error

      // Insert hashtags
      for (const tag of tags) {
        const { data: existing } = await sb.from('hashtags').select('id').eq('name', tag).single()
        let tagId
        if (existing) {
          tagId = existing.id
          await sb.from('hashtags').update({ videos_count: existing.videos_count + 1 }).eq('id', tagId)
        } else {
          const { data: newTag } = await sb.from('hashtags').insert({ name: tag, videos_count: 1 }).select().single()
          tagId = newTag?.id
        }
        if (tagId && vid) await sb.from('video_hashtags').insert({ video_id: vid.id, hashtag_id: tagId })
      }
    } else {
      const { error } = await sb.from('stories').insert({
        user_id: currentUser.id,
        video_url: result.videoUrl,
        thumbnail_url: result.thumbUrl
      })
      if (error) throw error
    }

    toast('Publié avec succès ⚡')
    closeUpload()
    loadFeed()
    loadStories()
  } catch (err) {
    document.getElementById('uploadErr').textContent = err.message
    document.getElementById('uploadSubmit').style.display = 'block'
  } finally {
    prog.style.display = 'none'
  }
}

// ══════════════════════════════════════════
// COMMENTS
// ══════════════════════════════════════════
async function openComments(videoId, count) {
  commentsVideoId = videoId
  document.getElementById('commentsModal').classList.add('open')
  document.getElementById('commentsCount').textContent = count
  const list = document.getElementById('commentsList')
  list.innerHTML = '<div class="loader-dots"><span></span><span></span><span></span></div>'

  const { data } = await sb.from('comments')
    .select('*, profiles(username)')
    .eq('video_id', videoId)
    .order('created_at', { ascending: true })
    .limit(50)

  if (!data?.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px">Sois le premier à commenter !</div>'
    return
  }
  list.innerHTML = data.map(c => `
    <div class="comment-item">
      <div class="comment-avatar">${(c.profiles?.username||'?')[0].toUpperCase()}</div>
      <div class="comment-body">
        <div class="comment-user">@${c.profiles?.username||'user'}</div>
        <div class="comment-text">${escHtml(c.content)}</div>
        <div class="comment-time">${timeAgo(c.created_at)}</div>
      </div>
    </div>
  `).join('')
  list.scrollTop = list.scrollHeight
}

function closeComments() {
  document.getElementById('commentsModal').classList.remove('open')
  commentsVideoId = null
}

async function sendComment() {
  if (!currentUser) { openAuth(); return }
  const input = document.getElementById('commentInput')
  const text = input.value.trim()
  if (!text || !commentsVideoId) return
  input.value = ''

  const { error } = await sb.from('comments').insert({
    video_id: commentsVideoId,
    user_id: currentUser.id,
    content: text
  })
  if (error) { toast('Erreur commentaire'); return }
  openComments(commentsVideoId, 0)
  // Update count in feed
  const cnt = document.getElementById('cc-'+commentsVideoId)
  if (cnt) cnt.textContent = parseInt(cnt.textContent||0) + 1
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function toast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2500)
}

function fmtNum(n) {
  if (!n) return '0'
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M'
  if (n >= 1000) return (n/1000).toFixed(1) + 'K'
  return String(n)
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso)) / 1000
  if (diff < 60) return 'à l\'instant'
  if (diff < 3600) return Math.floor(diff/60) + 'min'
  if (diff < 86400) return Math.floor(diff/3600) + 'h'
  return Math.floor(diff/86400) + 'j'
}
